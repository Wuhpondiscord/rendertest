<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Studio Pro | Collaborative DAW</title>
  
  <script src="https://unpkg.com/@discord/embedded-app-sdk@1.0.0/dist/index.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  
  <style>
    :root {
      --bg: #09090b; --panel: #18181f; --panel-light: #24242f;
      --text: #e2e2e8; --text-muted: #8b8b9e;
      --border: #313142; --border-highlight: #454559;
      --accent: #5865F2; --danger: #ff3366; --record: #ff4747;
      --step-off: #252530; --step-active: #ffffff;
    }
    
    body { 
      background: var(--bg); color: var(--text); 
      font-family: 'Inter', system-ui, sans-serif; 
      margin: 0; display: flex; flex-direction: column; 
      height: 100vh; overflow: hidden; user-select: none;
    }

    #loading-overlay { 
      position: fixed; inset: 0; background: var(--bg); 
      display: flex; flex-direction: column; justify-content: center; 
      align-items: center; z-index: 2000; transition: opacity 0.5s; 
    }

    .top-bar { 
      background: var(--panel); border-bottom: 1px solid var(--border); 
      padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
    }

    .transport { 
      background: var(--panel-light); padding: 12px 20px; 
      display: flex; justify-content: center; align-items: center; 
      gap: 15px; border-bottom: 1px solid var(--border); 
    }

    .control-group { 
      display: flex; align-items: center; gap: 8px; 
      background: var(--bg); padding: 5px 12px; 
      border-radius: 6px; border: 1px solid var(--border); 
    }
    .control-group label { font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }

    .channel-rack-container { 
      flex: 1; overflow-y: auto; padding: 20px; 
      background: radial-gradient(circle at 50% 50%, #121217 0%, #09090b 100%);
    }

    .layer-row { 
      display: flex; margin-bottom: 12px; background: var(--panel); 
      border: 1px solid var(--border); border-radius: 8px; width: fit-content;
    }

    .layer-controls { 
      position: sticky; left: 0; width: 320px; 
      background: var(--panel); padding: 15px; 
      z-index: 10; border-right: 2px solid var(--border);
    }

    .layer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .user-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; }

    .steps { display: flex; gap: 4px; padding: 10px 20px; align-items: center; }
    .step-btn { 
      width: 32px; height: 55px; border-radius: 4px; border: 2px solid transparent; 
      cursor: pointer; background: var(--step-off); transition: 0.1s;
    }
    .step-btn.active { background: var(--user-color); box-shadow: 0 0 12px var(--user-color); }
    .step-btn.playing { border-color: white; filter: brightness(1.4); }

    button, select, input[type="text"] { 
      background: var(--bg); color: var(--text); border: 1px solid var(--border); 
      padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
    }
    button:hover { background: var(--border-highlight); }
    
    .add-layer-btn { 
      margin-top: 10px; border: 2px dashed var(--border); 
      background: transparent; width: 320px; padding: 15px; color: var(--text-muted);
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <p id="load-status">INITIALIZING DAW...</p>
</div>

<div class="top-bar">
  <div class="nav-group">
    <strong id="projectNameDisplay">SESSION: Untitled</strong>
    <button onclick="saveProject()">SAVE</button>
    <select id="projectLoader" onchange="loadProject(this.value)"><option value="">LOAD...</option></select>
  </div>
  <div id="userName">Connecting...</div>
</div>

<div class="transport">
  <button id="playBtn" onclick="togglePlay()" style="background:var(--accent); color:white; width:80px;">PLAY</button>
  <button id="recBtn" onclick="toggleRecord()">⏺ EXPORT MP3</button>
  
  <div class="control-group">
    <label>MASTER BPM</label>
    <input id="bpm" type="range" min="40" max="220" value="120" oninput="updateBPMUI(this.value)" onchange="socket.emit('setBPM', Number(this.value))"/>
    <span id="bpmVal">120</span>
  </div>

  <button onclick="uploadSample()">+ CUSTOM SAMPLE</button>
  <button onclick="clearGrid()" style="color:var(--danger)">CLEAR ALL</button>
</div>

<div class="channel-rack-container">
  <div id="rack"></div>
  <button class="add-layer-btn" onclick="socket.emit('addTrack', { userId: currentUser.id, username: currentUser.username })">+ ADD NEW LAYER</button>
</div>

<script>
const BACKEND_URL = "https://beat-backend-5nnu.onrender.com";
const CLIENT_ID = "1484065774606876672";

const DiscordSDKClass = window.discordSdk ? window.discordSdk.DiscordSDK : (window.DiscordSDK || null);
const socket = io(BACKEND_URL, { transports: ["websocket"] });

let discordSdk = DiscordSDKClass ? new DiscordSDKClass(CLIENT_ID) : null;
let currentUser = { id: 'user-' + Math.random().toString(36).substr(2, 5), username: "Guest" };
let state = { channels: [], bpm: 120, steps: 16 };
let synths = {}; 
let isPlaying = false;
let isRecording = false;
let recorder = new Tone.Recorder();

const INSTRUMENTS = {
  "DRUMS": ["808 Kick", "Deep House Kick", "Trap Snare", "Studio Clap", "Closed Hat", "Open Hat"],
  "SYNTHS": ["Sub Bass", "Acid Synth", "Saw Lead", "Square Lead", "Sine Lead"],
  "OTHER": ["Custom Sample"]
};

// Generate a color based on User ID for visual identity
function getUserColor(id) {
    let hash = 0;
    for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
    return `hsl(${Math.abs(hash) % 360}, 65%, 55%)`;
}

async function setup() {
  try {
    if (!discordSdk) throw "No SDK";
    await discordSdk.ready();
    const { code } = await discordSdk.commands.authorize({ client_id: CLIENT_ID, response_type: "code", scope: ["identify"], prompt: "none" });
    const resp = await fetch(`${BACKEND_URL}/api/token`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({code}) });
    const { access_token } = await resp.json();
    const auth = await discordSdk.commands.authenticate({ access_token });
    currentUser = { id: auth.user.id, username: auth.user.username };
    finishSetup();
  } catch(e) {
    document.getElementById("load-status").innerHTML = `<button onclick="finishSetup()" style="padding:15px 30px; background:var(--accent); border:none; color:white; border-radius:8px;">START STUDIO (OFFLINE)</button>`;
  }
}

async function finishSetup() {
  document.getElementById("userName").innerText = `DJ: ${currentUser.username.toUpperCase()}`;
  socket.emit("registerUser", { userId: currentUser.id, username: currentUser.username });
  await Tone.start();
  Tone.Destination.connect(recorder);

  // Core Loop
  Tone.Transport.scheduleRepeat((time) => {
    state.channels.forEach(ch => {
      // Per-layer timing multiplier: 1=Normal, 0.5=Double Speed, 2=Half Speed
      const speed = ch.speed || 1; 
      const ticks = Tone.Transport.getTicksAtTime(time);
      const stepInterval = (Tone.Transport.PPQ / 4) * speed;
      
      if (ticks % stepInterval < 1) {
        const step = Math.floor(ticks / stepInterval) % state.steps;
        if (ch.pattern[step] && synths[ch.id]) {
          synths[ch.id].triggerAttackRelease(ch.note || "C2", "16n", time);
        }
        Tone.Draw.schedule(() => updateStepUI(ch.id, step), time);
      }
    });
  }, "32n");

  if(document.getElementById("loading-overlay")) document.getElementById("loading-overlay").remove();
}

function updateInstrument(ch) {
  if (synths[ch.id]) synths[ch.id].dispose();
  
  let node;
  if(ch.inst.includes("Kick")) node = new Tone.MembraneSynth();
  else if(ch.inst.includes("Hat") || ch.inst.includes("Snare")) node = new Tone.NoiseSynth();
  else if(ch.inst === "Custom Sample" && ch.sampleUrl) node = new Tone.Sampler({ urls: { C2: ch.sampleUrl } });
  else node = new Tone.PolySynth(Tone.Synth);

  node.toDestination();
  node.volume.value = ch.vol || -6;
  synths[ch.id] = node;
}

function renderRack() {
  const rack = document.getElementById("rack");
  rack.innerHTML = "";
  
  state.channels.forEach(ch => {
    const isMine = ch.userId === currentUser.id;
    const userColor = getUserColor(ch.userId);
    const row = document.createElement("div");
    row.className = "layer-row";
    row.innerHTML = `
      <div class="layer-controls" style="border-left: 4px solid ${userColor}">
        <div class="layer-header">
          <span class="user-badge" style="background:${userColor}">${ch.author}</span>
          ${isMine ? `<button onclick="socket.emit('removeTrack', '${ch.id}')" style="border:none; color:var(--danger)">×</button>` : ''}
        </div>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
          <select style="flex:1" onchange="socket.emit('updateTrackParam', {channelId:'${ch.id}', key:'inst', value:this.value})" ${!isMine?'disabled':''}>
            ${Object.keys(INSTRUMENTS).map(cat => `
              <optgroup label="${cat}">${INSTRUMENTS[cat].map(i => `<option value="${i}" ${ch.inst===i?'selected':''}>${i}</option>`).join('')}</optgroup>
            `).join('')}
          </select>
          <input type="text" value="${ch.note || 'C2'}" style="width:35px" onchange="socket.emit('updateTrackParam', {channelId:'${ch.id}', key:'note', value:this.value})">
        </div>
        <div style="display:flex; flex-direction:column; gap:5px">
          <label style="font-size:9px; color:var(--text-muted)">VOL: ${ch.vol || -6}dB | SPEED: ${ch.speed || 1}x</label>
          <input type="range" min="-40" max="6" value="${ch.vol || -6}" oninput="updateVolLocal('${ch.id}', this.value)" onchange="socket.emit('updateTrackParam', {channelId:'${ch.id}', key:'vol', value:Number(this.value)})">
          <input type="range" min="0.25" max="2" step="0.25" value="${ch.speed || 1}" onchange="socket.emit('updateTrackParam', {channelId:'${ch.id}', key:'speed', value:Number(this.value)})">
        </div>
      </div>
      <div class="steps">
        ${ch.pattern.map((p, i) => `
          <button id="step-${ch.id}-${i}" 
            class="step-btn ${p?'active':''}" 
            style="--user-color: ${userColor}"
            onclick="toggleStep('${ch.id}', ${i})"></button>
        `).join('')}
      </div>
    `;
    rack.appendChild(row);
  });
}

function updateStepUI(chId, currentStep) {
  document.querySelectorAll(`.step-btn[id^="step-${chId}"]`).forEach((btn, i) => {
    if(i === currentStep) btn.classList.add("playing");
    else btn.classList.remove("playing");
  });
}

function updateVolLocal(id, v) { if(synths[id]) synths[id].volume.value = v; }

function toggleStep(id, idx) {
  const ch = state.channels.find(c => c.id === id);
  if(ch.userId === currentUser.id) socket.emit("toggleStep", { channelId: id, stepIndex: idx, val: !ch.pattern[idx] });
}

function uploadSample() {
  const url = prompt("Enter direct URL to audio file (Dropbox/Discord link):");
  if(url) socket.emit("addTrack", { userId: currentUser.id, username: currentUser.username, inst: "Custom Sample", sampleUrl: url });
}

socket.on("initState", (s) => { state = s; updateBPMUI(s.bpm); renderRack(); state.channels.forEach(updateInstrument); });
socket.on("stateUpdate", (s) => { state = s; renderRack(); state.channels.forEach(updateInstrument); });
socket.on("stepToggled", ({ channelId, stepIndex, val }) => {
  const ch = state.channels.find(c => c.id === channelId);
  if (ch) ch.pattern[stepIndex] = val;
  const btn = document.getElementById(`step-${channelId}-${stepIndex}`);
  if(btn) val ? btn.classList.add("active") : btn.classList.remove("active");
});

function togglePlay() { isPlaying = !isPlaying; isPlaying ? Tone.Transport.start() : Tone.Transport.stop(); document.getElementById("playBtn").innerText = isPlaying ? "STOP" : "PLAY"; }
function updateBPMUI(v) { document.getElementById("bpmVal").innerText = v; Tone.Transport.bpm.value = v; }
function clearGrid() { if(confirm("Clear everything?")) socket.emit("clearGrid"); }
function saveProject() { const n = prompt("Save session as:", state.projectName); if(n) socket.emit("saveProject", n); }
function loadProject(v) { if(v) socket.emit("loadProject", v); }

async function toggleRecord() {
  if(!isRecording) {
    recorder.start();
    isRecording = true;
    document.getElementById("recBtn").innerText = "STOP & DOWNLOAD";
    if(!isPlaying) togglePlay();
  } else {
    const blob = await recorder.stop();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "studio-pro-export.webm"; a.click();
    isRecording = false;
    document.getElementById("recBtn").innerText = "⏺ EXPORT MP3";
  }
}

setup();
</script>
</body>
</html>
