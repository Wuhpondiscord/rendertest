<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Multiplayer DAW</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  
  <style>
    :root {
      --bg: #11111b; --panel: #1e1e2e; --panel-light: #313244;
      --text: #cdd6f4; --step-off-1: #45475a; --step-off-2: #585b70;
      --step-on: #89b4fa; --step-active: #f9e2af; --accent: #a6e3a1; --danger: #f38ba8;
    }
    
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; height: 100vh; overflow: hidden; }

    #start-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(17,17,27,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; }
    #start-overlay h1 { color: var(--accent); margin-bottom: 5px; }
    
    .transport { background: var(--panel); width: 100%; padding: 15px 20px; display: flex; justify-content: center; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 100; flex-wrap: wrap; }
    .status-area { position: absolute; left: 20px; display: flex; flex-direction: column; gap: 5px; }
    #status { font-size: 12px; font-weight: bold; color: var(--danger); }
    #users { font-size: 11px; color: #a6adc8; }

    button, select, input[type="range"] { background: var(--step-off-1); color: var(--text); border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; outline: none; }
    button:hover, select:hover { background: var(--step-off-2); }
    #playBtn { background: var(--accent); color: #111; }
    .control-group { display: flex; align-items: center; gap: 10px; background: var(--panel-light); padding: 5px 15px; border-radius: 6px; }

    .channel-rack-container { width: 98%; max-width: 1400px; margin-top: 20px; background: var(--panel); border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); overflow-x: auto; overflow-y: auto; height: calc(100vh - 150px); padding-bottom: 10px; }
    .channel-rack-container::-webkit-scrollbar { width: 12px; height: 12px; }
    .channel-rack-container::-webkit-scrollbar-track { background: var(--panel); border-radius: 8px;}
    .channel-rack-container::-webkit-scrollbar-thumb { background: var(--step-off-1); border-radius: 8px; }

    .channel-rack { display: inline-block; padding: 20px; padding-left: 0; }
    .row { display: flex; align-items: center; margin-bottom: 8px; }

    .track-controls { position: sticky; left: 0; display: flex; align-items: center; gap: 5px; background: var(--panel); padding-right: 15px; z-index: 10; border-right: 2px solid var(--panel-light); }
    .delete-btn { background: transparent; color: var(--danger); padding: 5px 10px; font-size: 16px; }
    .delete-btn:hover { background: rgba(243, 139, 168, 0.2); }
    
    .inst-select { width: 190px; font-size: 11px; padding: 6px; }
    .note-select { width: 60px; font-size: 11px; padding: 6px; }
    .vol-slider { width: 60px; height: 4px; cursor: pointer; }

    .steps { display: flex; gap: 4px; padding-right: 20px;}
    .step-btn { width: 35px; height: 45px; border-radius: 4px; border: 2px solid transparent; padding: 0; flex-shrink: 0; transition: transform 0.05s;}
    .step-btn.beat-0 { background: var(--step-off-1); }
    .step-btn.beat-1 { background: var(--step-off-2); }
    
    .add-track-btn { margin-top: 15px; margin-left: 20px; background: var(--step-off-1); width: calc(100% - 40px); border: 2px dashed var(--step-off-2); color: var(--text); padding: 15px; font-size: 16px; }
  </style>
</head>
<body>

<div id="start-overlay" onclick="initAudio()">
  <h1>Discord Studio ULTRA</h1>
  <p>Click anywhere to load the 150+ Synth Engine</p>
</div>

<div class="transport">
  <div class="status-area">
    <div id="status">OFFLINE</div>
    <div id="users">Users: 1</div>
  </div>

  <button id="playBtn" onclick="togglePlay()">PLAY</button>
  <button onclick="clearGrid()">CLEAR</button>
  
  <div class="control-group">
    <label style="font-size: 12px;">STEPS</label>
    <select id="stepSelect" onchange="changeSteps(this.value)">
      <option value="16">16</option>
      <option value="32">32</option>
      <option value="64">64</option>
    </select>
  </div>

  <div class="control-group">
    <input id="bpm" type="range" min="60" max="180" value="120" oninput="updateBPMUI(this.value)" onchange="sendBPM(this.value)"/>
    <span id="bpmVal" style="font-family: monospace; font-size: 1.1em; width: 70px;">120 BPM</span>
  </div>
</div>

<div class="channel-rack-container">
  <div class="channel-rack" id="rack"></div>
</div>

<script>
const socket = io("https://beat-backend-5nnu.onrender.com", { transports: ["websocket"] });
let currentStep = 0; let isPlaying = false;
let buttons = {}; let synthInstances = {};
let state = { bpm: 120, steps: 16, channels: [] };
const NOTES = ["C1","D1","E1","F1","G1","A1","B1", "C2","D2","E2","F2","G2","A2","B2", "C3","D3","E3","F3","G3","A3","B3", "C4","D4","E4","F4","G4","A4","B4", "C5","D5","E5","F5","G5","A5","B5", "C6","D6","E6","F6","G6","A6","B6"];

// --- 150+ SYNTH FACTORY ---
const p = (type, opts) => new Tone.PolySynth(type, opts);
const m = (opts) => new Tone.MembraneSynth(opts);
const n = (opts) => new Tone.NoiseSynth(opts);
const met = (opts) => new Tone.MetalSynth(opts);

const SYNTH_LIBRARY = {
  "DRUMS: Kicks": {
    "Kick - 808 Trap": () => m({ pitchDecay: 0.005, octaves: 2, envelope: { attack: 0.01, decay: 0.8, sustain: 0.1, release: 1 } }),
    "Kick - 808 Short": () => m({ pitchDecay: 0.01, octaves: 3, envelope: { attack: 0.01, decay: 0.3 } }),
    "Kick - 808 Distorted": () => m({ pitchDecay: 0.01, octaves: 2, envelope: { attack: 0.01, decay: 0.6 } }),
    "Kick - Sub Deep": () => m({ pitchDecay: 0.05, octaves: 2, envelope: { attack: 0.01, decay: 0.5 } }),
    "Kick - House Punch": () => m({ pitchDecay: 0.1, octaves: 6, envelope: { attack: 0.001, decay: 0.2, sustain: 0 } }),

    "Kick - Hardstyle": () => m({ pitchDecay: 0.2, octaves: 10, envelope: { attack: 0.001, decay: 0.4 } }),
    "Kick - Lo-Fi": () => m({ pitchDecay: 0.03, octaves: 3, envelope: { attack: 0.05, decay: 0.3 } }),
    "Kick - Acoustic Body": () => m({ pitchDecay: 0.05, octaves: 4, envelope: { attack: 0.01, decay: 0.3 } }),
    "Kick - Laser Zap": () => m({ pitchDecay: 0.1, octaves: 8, envelope: { attack: 0.001, decay: 0.1 } }),
  },
  "DRUMS: Snares & Claps": {
    "Snare - Trap Tight": () => n({ noise: { type: 'pink' }, envelope: { attack: 0.001, decay: 0.1, sustain: 0 } }),
    "Snare - Trap Wide": () => n({ noise: { type: 'pink' }, envelope: { attack: 0.005, decay: 0.2, sustain: 0 } }),
    "Snare - Acoustic Loose": () => n({ noise: { type: 'white' }, envelope: { attack: 0.005, decay: 0.25, sustain: 0 } }),
    "Snare - Lo-Fi Boxy": () => n({ noise: { type: 'brown' }, envelope: { attack: 0.02, decay: 0.3, sustain: 0 } }),

  "DRUMS: Hats & Cymbals": {

  "KEYS & PIANOS": {
    "Keys - Grand Piano (Synth)": () => p(Tone.Synth, { oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 1.5, sustain: 0, release: 1 } }),
    "Keys - Electric Piano (FM)": () => p(Tone.FMSynth, { harmonicity: 2, modulationIndex: 1.5, oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 2, sustain: 0.2 } }),

  },
  "STRINGS, ORCHESTRA & CHOIR": {
    "Strings - Violin": () => p(Tone.Synth, { oscillator: { type: "sawtooth" }, envelope: { attack: 0.2, decay: 0.1, sustain: 0.8, release: 1 } }),
    "Strings - Cello": () => p(Tone.AMSynth, { harmonicity: 1, oscillator: { type: "sawtooth" }, envelope: { attack: 0.3, decay: 1, sustain: 0.8, release: 1.5 } }),
    "Strings - Ensemble (Huge)": () => p(Tone.Synth, { oscillator: { type: "fatsawtooth", count: 5, spread: 20 }, envelope: { attack: 0.5, decay: 1, sustain: 0.8, release: 2 } }),
    "Strings - Pizzicato": () => p(Tone.Synth, { oscillator: { type: "sawtooth" }, envelope: { attack: 0.01, decay: 0.15, sustain: 0, release: 0.1 } }),

    "Brass - Synth Ensemble": () => p(Tone.Synth, { oscillator: { type: "fatsawtooth" }, envelope: { attack: 0.1, decay: 0.2, sustain: 0.9, release: 0.5 } }),
    "Choir - Ahh (FM)": () => p(Tone.FMSynth, { harmonicity: 0.5, modulationIndex: 5, oscillator: { type: "triangle" }, envelope: { attack: 0.5, decay: 1, sustain: 1, release: 2 } }),

  "PADS & ATMOSPHERES": {

    "Pad - Dark (Saw)": () => p(Tone.Synth, { oscillator: { type: "fatsawtooth", count: 3, spread: 20 }, envelope: { attack: 1.5, decay: 1, sustain: 0.8, release: 3 } }),

  "LEADS & SYNTHS": {

  "CHIPTUNE & 8-BIT": {

    "8-Bit - Pluck": () => p(Tone.Synth, { oscillator: { type: "square" }, envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.05 } }),
    "8-Bit - Noise Hit": () => n({ noise: { type: 'white' }, envelope: { attack: 0.001, decay: 0.1, sustain: 0 } }),
    "8-Bit - Bass": () => p(Tone.Synth, { oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.5, release: 0.1 } }),
    "8-Bit - Laser Fast": () => m({ pitchDecay: 0.01, octaves: 10, envelope: { attack: 0.001, decay: 0.1 } }),
  },
  "SOUND FX & RISERS": {
    "FX - Sub Drop": () => m({ pitchDecay: 0.5, octaves: 10, envelope: { attack: 0.01, decay: 3 } }),
    "FX - Laser Gun": () => m({ pitchDecay: 0.01, octaves: 8, envelope: { attack: 0.001, decay: 0.3 } }),
    "FX - White Noise Sweep Up": () => n({ noise: { type: 'white' }, envelope: { attack: 2, decay: 0.1, sustain: 1, release: 0.1 } }),
    "FX - White Noise Sweep Down": () => n({ noise: { type: 'white' }, envelope: { attack: 0.01, decay: 2, sustain: 0, release: 0.1 } }),
    "FX - Explosion": () => n({ noise: { type: 'brown' }, envelope: { attack: 0.01, decay: 1.5, sustain: 0 } }),
    "FX - Beep Boop": () => p(Tone.Synth, { oscillator: { type: "sine" }, envelope: { attack: 0.001, decay: 0.1, sustain: 0 } }),
    "FX - Magic Chime": () => met({ frequency: 1000, envelope: { attack: 0.01, decay: 2 }, harmonicity: 12, resonance: 8000 }),
    "FX - Alarm": () => p(Tone.FMSynth, { harmonicity: 0.5, modulationIndex: 10, envelope: { attack: 0.05, decay: 0.5, sustain: 0 } }),
  }
};

let masterCompressor, masterReverb;

async function initAudio() {
  if (typeof Tone === "undefined") return alert("Audio blocked by Discord.");
  await Tone.start();

  masterCompressor = new Tone.Compressor({ threshold: -20, ratio: 4 }).toDestination();
  masterReverb = new Tone.Reverb({ decay: 2.5, wet: 0.15 }).connect(masterCompressor);

  startTimingLoop();
  document.getElementById("start-overlay").style.display = "none";
  if(state.bpm) Tone.Transport.bpm.value = state.bpm;
}

function syncSynths() {
  if(!masterReverb) return;
  
  state.channels.forEach(ch => {
    if (!synthInstances[ch.id] || synthInstances[ch.id].type !== ch.inst) {
      if (synthInstances[ch.id]) synthInstances[ch.id].node.dispose();
      
      let generator = SYNTH_LIBRARY["KEYS & PIANOS"]["Keys - Grand Piano (Synth)"];
      for (const category in SYNTH_LIBRARY) {
        if (SYNTH_LIBRARY[category][ch.inst]) {
          generator = SYNTH_LIBRARY[category][ch.inst]; break;
        }
      }
      
      let node = generator().connect(masterReverb);
      synthInstances[ch.id] = { type: ch.inst, node: node };
    }
    if (synthInstances[ch.id] && synthInstances[ch.id].node.volume) {
      synthInstances[ch.id].node.volume.value = ch.vol;
    }
  });

  Object.keys(synthInstances).forEach(id => {
    if (!state.channels.find(c => c.id === id)) {
      synthInstances[id].node.dispose(); delete synthInstances[id];
    }
  });
}

function startTimingLoop() {
  Tone.Transport.scheduleRepeat((time) => {
    if (currentStep >= state.steps) currentStep = 0; 

    state.channels.forEach(ch => {
      if (ch.pattern[currentStep]) {
        const synth = synthInstances[ch.id];
        if (synth && synth.node) {
          try {
            synth.node.triggerAttackRelease(ch.note, "16n", time);
          } catch(e) {}
        }
      }
    });

    Tone.Draw.schedule(() => { updatePlayhead(currentStep); }, time);
    currentStep = (currentStep + 1) % state.steps;
  }, "16n");
}

function buildGrid() {
  const rack = document.getElementById("rack");
  rack.innerHTML = ""; buttons = {}; syncSynths();

  state.channels.forEach(ch => {
    const row = document.createElement("div");
    row.className = "row";

    const controls = document.createElement("div");
    controls.className = "track-controls";

    const delBtn = document.createElement("button");
    delBtn.className = "delete-btn"; delBtn.innerText = "✖";
    delBtn.onclick = () => socket.emit("removeTrack", ch.id);
    controls.appendChild(delBtn);

    const instSelect = document.createElement("select");
    instSelect.className = "inst-select";
    
    Object.keys(SYNTH_LIBRARY).forEach(category => {
      const optgroup = document.createElement("optgroup");
      optgroup.label = category;
      Object.keys(SYNTH_LIBRARY[category]).forEach(inst => {
        const opt = document.createElement("option");
        opt.value = opt.innerText = inst;
        if (ch.inst === inst) opt.selected = true;
        optgroup.appendChild(opt);
      });
      instSelect.appendChild(optgroup);
    });
    instSelect.onchange = (e) => socket.emit("updateTrack", { channelId: ch.id, key: "inst", value: e.target.value });
    controls.appendChild(instSelect);

    const noteSelect = document.createElement("select");
    noteSelect.className = "note-select";
    NOTES.forEach(note => {
      const opt = document.createElement("option");
      opt.value = opt.innerText = note;
      if (ch.note === note) opt.selected = true;
      noteSelect.appendChild(opt);
    });
    noteSelect.onchange = (e) => socket.emit("updateTrack", { channelId: ch.id, key: "note", value: e.target.value });
    controls.appendChild(noteSelect);

    const volSlider = document.createElement("input");
    volSlider.type = "range"; volSlider.min = "-30"; volSlider.max = "10"; volSlider.value = ch.vol;
    volSlider.className = "vol-slider"; volSlider.title = "Volume";
    volSlider.onchange = (e) => socket.emit("updateTrack", { channelId: ch.id, key: "vol", value: Number(e.target.value) });
    controls.appendChild(volSlider);

    row.appendChild(controls);

    const stepsContainer = document.createElement("div");
    stepsContainer.className = "steps";
    buttons[ch.id] = [];

    ch.pattern.forEach((active, i) => {
      const btn = document.createElement("button");
      btn.className = `step-btn beat-${Math.floor(i / 4) % 2}`;
      btn.style.background = active ? "var(--step-on)" : "";
      btn.onclick = () => {
        const isActive = !ch.pattern[i];
        ch.pattern[i] = isActive;
        btn.style.background = isActive ? "var(--step-on)" : "";
        socket.emit("toggleStep", { channelId: ch.id, stepIndex: i });
      };
      stepsContainer.appendChild(btn); buttons[ch.id].push(btn);
    });
    row.appendChild(stepsContainer); rack.appendChild(row);
  });

  const addBtn = document.createElement("button");
  addBtn.className = "add-track-btn"; addBtn.innerText = "+ ADD TRACK";
  addBtn.onclick = () => socket.emit("addTrack");
  rack.appendChild(addBtn);
}

function updatePlayhead(stepPlaying) {
  state.channels.forEach(ch => {
    if(!buttons[ch.id]) return;
    buttons[ch.id].forEach((btn, i) => {
      if (i === stepPlaying) { btn.style.borderColor = "var(--step-active)"; btn.style.transform = "scale(1.05)"; } 
      else { btn.style.borderColor = "transparent"; btn.style.transform = "scale(1)"; }
    });
  });
}

function togglePlay() { socket.emit("togglePlay", !isPlaying); }
function clearGrid() { socket.emit("clearGrid"); }
function updateBPMUI(val) {
  document.getElementById("bpmVal").innerText = val + " BPM";
  if (typeof Tone !== "undefined" && Tone.Transport) Tone.Transport.bpm.value = val;
}
function sendBPM(val) { socket.emit("setBPM", Number(val)); }
function changeSteps(val) { socket.emit("changeSteps", Number(val)); }
function applyPlayState(playing) {
  isPlaying = playing; const btn = document.getElementById("playBtn");
  if (typeof Tone !== "undefined" && Tone.Transport) {
    if (isPlaying) { Tone.Transport.start(); btn.innerText = "PAUSE"; btn.style.background = "var(--danger)"; } 
    else { Tone.Transport.pause(); btn.innerText = "PLAY"; btn.style.background = "var(--accent)"; }
  }
}

socket.on("connect", () => { document.getElementById("status").innerText = "ONLINE"; document.getElementById("status").style.color = "var(--accent)"; });
socket.on("disconnect", () => { document.getElementById("status").innerText = "OFFLINE"; document.getElementById("status").style.color = "var(--danger)"; });
socket.on("userCount", (count) => { document.getElementById("users").innerText = `Users: ${count}`; });

socket.on("initState", (newState) => { state = newState; document.getElementById("bpm").value = state.bpm; document.getElementById("stepSelect").value = state.steps; updateBPMUI(state.bpm); buildGrid(); applyPlayState(state.isPlaying); });
socket.on("stateUpdate", (newState) => { state = newState; document.getElementById("stepSelect").value = state.steps; buildGrid(); });
socket.on("stepToggled", ({ channelId, stepIndex, val }) => {
  const ch = state.channels.find(c => c.id === channelId);
  if (ch) ch.pattern[stepIndex] = val;
  if (buttons[channelId] && buttons[channelId][stepIndex]) buttons[channelId][stepIndex].style.background = val ? "var(--step-on)" : "";
});
socket.on("playUpdate", applyPlayState);
socket.on("bpmUpdate", (newBpm) => { document.getElementById("bpm").value = newBpm; updateBPMUI(newBpm); });
</script>
