<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sleezy Records</title>

  <!-- Tone.js and lamejs loaded dynamically in boot() to use same-origin proxy in Discord -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      /* FL Studio palette — charcoal/graphite with warm orange */
      --bg:       #1a1a1a;
      --panel:    #232323;
      --panel-lt: #2a2a2a;
      --panel-dk: #161616;
      --hover:    #303030;
      --text:     #e8e0d0;
      --dim:      #686860;
      --border:   #383830;
      --bhi:      #484840;
      --accent:   #e87820;   /* FL orange */
      --ad:       rgba(232,120,32,.12);
      --ag:       rgba(232,120,32,.35);
      --danger:   #e83030;
      --rec:      #e83030;
      --recg:     rgba(232,48,48,.4);
      --ok:       #70c840;
      --warn:     #e8b820;
      --s0:       #1e1e1e;   /* step off-beat */
      --s1:       #242418;   /* step on-beat — warm tint */
      --mono:     'Space Mono', monospace;
      --sans:     'DM Sans', sans-serif;
      --ctrl-w:   300px;
      --hdr-h:    48px;
      --tp1-h:    46px;
      --tp2-h:    38px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── OVERLAY ───────────────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: #111111;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 0;
      z-index: 9999;
    }
    .ov-logo {
      font-family: var(--mono); font-size: 26px; font-weight: 700;
      letter-spacing: 8px; color: var(--accent);
      text-shadow: 0 0 40px var(--ag);
      margin-bottom: 4px;
    }
    .ov-sub {
      font-family: var(--mono); font-size: 8px; letter-spacing: 5px;
      color: #504840; margin-bottom: 36px;
    }
    .ov-bar {
      width: 180px; height: 2px;
      background: #2a2a2a; border-radius: 1px; overflow: hidden;
      margin-bottom: 10px;
    }
    .ov-fill {
      height: 100%; width: 0;
      background: var(--accent); box-shadow: 0 0 8px var(--ag);
      transition: width .35s ease;
    }
    #ov-msg {
      font-family: var(--mono); font-size: 8px; letter-spacing: 3px;
      color: #504840; margin-bottom: 28px; min-height: 14px;
    }
    #enter-btn {
      font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
      background: #2a2a2a; color: #504840;
      border: 1px solid #383830;
      padding: 11px 36px; border-radius: 2px;
      cursor: not-allowed; transition: all .2s; outline: none;
    }
    #enter-btn.ready {
      background: var(--accent); color: #000;
      border-color: var(--accent); cursor: pointer;
      box-shadow: 0 0 28px var(--ag);
    }
    #enter-btn.ready:hover { transform: scale(1.03); box-shadow: 0 0 40px var(--ag); }

    /* ── AUDIO UNLOCK ──────────────────────────────────────────── */
    #audio-unlock {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9998;
      background: var(--accent); color: #000;
      font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
      text-align: center; padding: 9px; cursor: pointer;
      animation: blink 1.4s ease-in-out infinite;
    }

    /* ── HEADER — FL-style title bar with warm gradient ─────────── */
    .header {
      flex-shrink: 0; height: var(--hdr-h);
      background: linear-gradient(180deg, #2e2e2e 0%, #232323 100%);
      border-bottom: 2px solid #111;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 12px; gap: 8px;
    }
    .hdr-left  { display: flex; align-items: center; gap: 10px; }
    .hdr-right { display: flex; align-items: center; gap: 6px; }
    .app-name {
      font-family: var(--mono); font-size: 14px; font-weight: 700;
      letter-spacing: 3px; color: var(--accent);
      text-shadow: 0 0 16px var(--ag);
    }
    .proj-name {
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      color: #a09880; letter-spacing: 0;
      max-width: 180px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      border-left: 1px solid var(--border); padding-left: 10px;
    }
    .tbtn {
      font-family: var(--sans); font-size: 10px; font-weight: 500;
      background: #2a2a2a; color: #888878;
      border: 1px solid #3a3a30;
      padding: 4px 10px; border-radius: 2px;
      cursor: pointer; transition: all .1s; outline: none;
    }
    .tbtn:hover { background: var(--hover); color: var(--text); border-color: var(--bhi); }
    .tbtn.hi { background: #3a2810; border-color: #c06010; color: #e8a040; }
    .tbtn.hi:hover { background: #4a3018; border-color: var(--accent); }
    #proj-loader {
      font-family: var(--sans); font-size: 10px;
      background: #2a2a2a; color: #888878;
      border: 1px solid #3a3a30;
      padding: 4px 8px; border-radius: 2px; cursor: pointer; outline: none;
    }
    #user-disp {
      font-family: var(--mono); font-size: 9px;
      color: #686858; letter-spacing: 1px;
    }
    #status {
      font-family: var(--mono); font-size: 8px; font-weight: 700;
      letter-spacing: 2px; padding: 3px 8px;
      border: 1px solid #383830; border-radius: 2px;
      color: #504840; background: #1a1a1a;
    }
    #status.live {
      color: var(--ok); border-color: #507030;
      box-shadow: 0 0 6px rgba(112,200,64,.2);
    }
    #users { font-family: var(--mono); font-size: 9px; color: #585848; }
    .users-badge {
      font-family: var(--mono); font-size: 8px; letter-spacing: 1.5px;
      color: #585848; cursor: pointer; padding: 3px 8px;
      border: 1px solid #383830; border-radius: 2px;
      transition: all .1s;
    }
    .users-badge:hover { color: var(--text); border-color: #585848; }
    .users-badge.has-users { color: var(--ok); border-color: #507030; }
    .users-panel {
      position: fixed; top: var(--hdr-h); right: 10px;
      background: #1e1e1c; border: 1px solid #3a3a30;
      border-radius: 3px; z-index: 500;
      min-width: 180px; box-shadow: 0 4px 20px rgba(0,0,0,.7);
    }
    .users-panel.hidden { display: none; }
    .users-panel-hdr {
      font-family: var(--mono); font-size: 7px; letter-spacing: 2px;
      color: #585848; padding: 7px 10px 5px;
      border-bottom: 1px solid #2a2a28;
    }
    .user-entry {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-bottom: 1px solid #222220;
      font-family: var(--sans); font-size: 11px; font-weight: 500;
    }
    .user-entry:last-child { border-bottom: none; }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .user-you { font-size: 8px; color: #585848; margin-left: auto; }
    #user-presence {
      display: flex; align-items: center; gap: 4px; margin-right: 4px;
    }
    .up-dot {
      font-family: var(--sans); font-size: 9px; font-weight: 600;
      padding: 2px 8px; border-radius: 2px; border: 1px solid transparent;
      white-space: nowrap;
    }
    .up-dot.me { font-weight: 800; }

    /* ── TRANSPORT ROW 1 — FL style thick bar ───────────────────── */
    .tp1 {
      flex-shrink: 0; height: var(--tp1-h);
      background: linear-gradient(180deg, #2a2a2a 0%, #222222 100%);
      border-bottom: 2px solid #111;
      display: flex; align-items: center;
      justify-content: center; gap: 4px;
      padding: 0 12px; position: relative;
    }
    .tp1-right { position: absolute; right: 12px; display: flex; gap: 4px; }
    .tt {
      font-family: var(--sans); font-size: 10px; font-weight: 600;
      background: #2e2e2e;
      color: #a09880;
      border: 1px solid #3a3a30;
      border-bottom: 2px solid #111;
      padding: 5px 14px; border-radius: 2px;
      cursor: pointer; transition: all .08s; outline: none; white-space: nowrap;
    }
    .tt:hover { background: #383828; color: var(--text); border-color: #505040; }
    .tt:active { border-bottom-width: 1px; transform: translateY(1px); }
    #play-btn {
      background: linear-gradient(180deg, #f09030 0%, #c06010 100%);
      color: #1a0800; font-weight: 800;
      border: 1px solid #e87820; border-bottom: 2px solid #804010;
      min-width: 84px; font-size: 11px; letter-spacing: 1px;
      box-shadow: 0 2px 12px rgba(232,120,32,.4);
    }
    #play-btn:hover { background: linear-gradient(180deg, #f8a040 0%, #d07020 100%); }
    #play-btn.on {
      background: linear-gradient(180deg, #804010 0%, #602808 100%);
      color: #f0a040; border-color: #c06010;
      box-shadow: inset 0 1px 4px rgba(0,0,0,.5);
    }
    #btn-stop {
      background: linear-gradient(180deg, #363636 0%, #282828 100%);
      color: #e0d0c0; font-weight: 700; font-size: 14px;
      border-bottom: 2px solid #111; padding: 4px 12px;
    }
    #rec-btn {
      color: #e86060; border-color: rgba(232,80,80,.4);
      background: linear-gradient(180deg, #2e2020 0%, #242020 100%);
    }
    #rec-btn.on {
      background: linear-gradient(180deg, #e83030 0%, #b02020 100%);
      color: #fff; border-color: var(--rec);
      box-shadow: 0 2px 10px var(--recg);
      animation: blink 1.4s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── TRANSPORT ROW 2 — parameter strip ──────────────────────── */
    .tp2 {
      flex-shrink: 0; height: var(--tp2-h);
      background: #1e1e1e;
      border-bottom: 1px solid #111;
      display: flex; align-items: stretch;
      gap: 0;
    }
    .tp2-group {
      display: flex; align-items: center; gap: 8px;
      padding: 0 14px;
      border-right: 1px solid #2a2a2a;
    }
    .tp2-group:last-child { border-right: none; }
    .tp2-lbl {
      font-family: var(--mono); font-size: 7px; letter-spacing: 2px;
      color: #585848; white-space: nowrap; text-transform: uppercase;
    }
    .ctrl-val {
      font-family: var(--mono); font-size: 13px; font-weight: 700;
      color: #e8c090; min-width: 32px;
    }
    .ctrl-sel {
      font-family: var(--mono); font-size: 10px;
      background: transparent; color: #c0b090;
      border: none; outline: none; cursor: pointer;
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      height: 3px; border-radius: 2px;
      background: #383830; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: radial-gradient(circle, #f0a040 0%, #c06010 100%);
      cursor: pointer; border: 1px solid #e87820;
      box-shadow: 0 0 5px var(--ag);
    }
    input[type=range]::-moz-range-thumb {
      width: 13px; height: 13px; border-radius: 50%; border: 1px solid #e87820;
      background: #e87820; cursor: pointer;
    }

    /* ── BEATS BAR ─────────────────────────────────────────────── */
    .beats-bar {
      flex-shrink: 0; background: #1e1e1e;
      border-bottom: 1px solid #111;
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px; overflow-x: auto; min-height: 34px;
    }
    .beats-bar::-webkit-scrollbar { height: 2px; }
    .beats-bar::-webkit-scrollbar-thumb { background: #484838; border-radius: 1px; }
    .beats-lbl {
      font-family: var(--mono); font-size: 7px; letter-spacing: 3px;
      color: #484838; white-space: nowrap; margin-right: 4px;
    }
    .beat-tab {
      font-family: var(--sans); font-size: 10px; font-weight: 500;
      background: #2a2a28; color: #706858;
      border: 1px solid #3a3a30; border-bottom: 2px solid #111;
      padding: 3px 12px; border-radius: 2px;
      cursor: pointer; transition: all .1s; outline: none;
      white-space: nowrap; display: flex; align-items: center; gap: 5px;
    }
    .beat-tab:hover { background: #343428; color: var(--text); border-color: #505040; }
    .beat-tab.active {
      background: linear-gradient(180deg, #3a2810 0%, #2e2010 100%);
      border-color: #c06010; color: #e8a040;
      border-bottom-color: #804010;
    }
    .bt-del { font-size: 9px; color: #484838; line-height: 1; background: none; border: none; cursor: pointer; padding: 0 2px; }
    .bt-del:hover { color: var(--danger) !important; }
    .beat-add {
      font-family: var(--sans); font-size: 10px; font-weight: 500;
      background: transparent; color: #484838;
      border: 1px dashed #383830;
      padding: 3px 12px; border-radius: 2px;
      cursor: pointer; transition: all .1s; outline: none; white-space: nowrap;
    }
    .beat-add:hover { border-color: #c06010; color: #e8a040; }

    /* ── RACK ──────────────────────────────────────────────────── */
    .rack-wrap {
      flex: 1; overflow: auto;
      background: #161616; padding: 6px 10px 60px;
    }
    .rack-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    .rack-wrap::-webkit-scrollbar-thumb { background: #383830; border-radius: 3px; }
    #rack { display: inline-flex; flex-direction: column; gap: 2px; min-width: 100%; }

    /* ── LAYER ROW ─────────────────────────────────────────────── */
    .lrow {
      display: flex;
      align-items: stretch;
      background: #222220;
      border: 1px solid #2e2e28;
      border-radius: 3px;
      min-width: max-content;
      transition: border-color .1s;
    }
    .lrow:hover { border-color: #484838; }

    .lctrl {
      position: sticky; left: 0; z-index: 10;
      background: #222220;
      border-right: 1px solid #2e2e28;
      border-radius: 3px 0 0 3px;
      width: var(--ctrl-w);
      height: 136px;
      flex-shrink: 0;
      display: flex; flex-direction: column;
      justify-content: space-between;
      padding: 6px 8px;
      overflow: hidden;
    }

    .lhdr { display: flex; justify-content: space-between; align-items: center; height: 22px; }
    .l-author {
      font-family: var(--sans); font-size: 10px; font-weight: 700;
      letter-spacing: 0; text-transform: none; flex-shrink: 0;
    }
    .l-label {
      font-family: var(--sans); font-size: 10px;
      background: transparent; border: none;
      border-bottom: 1px solid transparent;
      outline: none; color: #686858; cursor: text; width: 80px;
      transition: border-color .1s;
    }
    .l-label:focus { color: var(--text); border-bottom-color: #c06010; }
    .l-label::placeholder { color: #484838; }
    .l-acts { display: flex; gap: 2px; }
    .ibtn {
      background: transparent; border: none; cursor: pointer;
      font-family: var(--sans); font-size: 10px; font-weight: 600;
      color: #585848; padding: 2px 5px; border-radius: 2px;
      transition: all .08s; line-height: 1;
    }
    .ibtn:hover { background: #333328; color: var(--text); }
    .ibtn.muted  { color: var(--danger) !important; }
    .ibtn.soloed { color: var(--warn) !important; }
    .ibtn.del:hover { color: var(--danger); }

    .lrow1, .lrow2, .lrow3 {
      display: flex; align-items: center; gap: 3px;
      height: 26px; flex-shrink: 0;
    }

    .isel {
      font-family: var(--sans); font-size: 11px;
      background: #1a1a18; color: var(--text);
      border: 1px solid #333328; border-radius: 2px;
      padding: 0 5px; height: 26px; outline: none; cursor: pointer;
      flex: 1; min-width: 0;
    }
    .isel:focus { border-color: #c06010; }
    .msel {
      font-family: var(--mono); font-size: 9px;
      background: #1a1a18; color: #c0a080;
      border: 1px solid #333328; border-radius: 2px;
      padding: 0 4px; height: 26px; outline: none; cursor: pointer;
      flex-shrink: 0;
    }
    .msel:focus { border-color: #c06010; }

    .sl-row {
      display: flex; align-items: center; gap: 4px;
      background: #1a1a18; border: 1px solid #333328;
      border-radius: 2px; padding: 0 6px;
      height: 26px; flex: 1; min-width: 0;
      overflow: hidden;
    }
    .sl-lbl {
      font-family: var(--mono); font-size: 7px; letter-spacing: 1.5px;
      color: #585848; white-space: nowrap; flex-shrink: 0;
    }
    .sl-row input[type=range] { flex: 1; min-width: 0; }
    .sl-num {
      font-family: var(--mono); font-size: 8px;
      color: #908070; min-width: 32px; text-align: right; flex-shrink: 0;
    }

    .lrow3 { gap: 3px; flex-wrap: nowrap; }
    .lrow3 .sl-row { min-width: 0; }

    .samp {
      font-size: 11px; background: #1a1a18;
      border: 1px solid #333328; border-radius: 2px;
      padding: 0 7px; height: 26px; cursor: pointer;
      transition: border-color .1s; flex-shrink: 0; color: #907060;
    }
    .samp:hover { border-color: #c06010; color: #e8a040; }
    .samp.loaded { border-color: #507030; color: var(--ok); }

    /* ── STEPS ─────────────────────────────────────────────────── */
    .steps {
      display: flex; align-items: center; gap: 2px;
      padding: 0 8px;
      align-self: stretch;
      align-content: center;
    }
    .sgap { width: 4px; flex-shrink: 0; }
    .sbtn {
      width: 24px; height: 100%;
      min-height: 44px; max-height: 136px;
      flex-shrink: 0;
      border-radius: 2px; border: 1px solid transparent;
      padding: 0; cursor: pointer;
      transition: filter .06s;
    }
    /* FL-style: off steps are dark, on steps are coloured per channel */
    .sbtn.d0 { background: #1e1e1c; border-color: #2a2a28; }
    .sbtn.d1 { background: #242420; border-color: #2e2e2c; }
    .sbtn.on { border-color: transparent !important; }
    .sbtn.hd {
      /* playhead — white-ish overlay flash */
      border-color: rgba(255,255,255,.9) !important;
      filter: brightness(1.3);
    }
    .sbtn:hover { filter: brightness(1.5); }

    .add-layer {
      font-family: var(--sans); font-size: 10px; font-weight: 500;
      background: transparent; color: #484838;
      border: 1px dashed #383830;
      padding: 8px; border-radius: 2px;
      cursor: pointer; width: var(--ctrl-w);
      transition: all .1s; margin-top: 3px;
    }
    .add-layer:hover { border-color: #c06010; color: #e8a040; }

    /* ── TOASTS ────────────────────────────────────────────────── */
    #toasts {
      position: fixed; bottom: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 6px;
      z-index: 9997; pointer-events: none;
    }
    .toast {
      font-family: var(--sans); font-size: 11px; font-weight: 500;
      background: #2a2a28; border: 1px solid #484838;
      color: var(--text); padding: 8px 14px; border-radius: 2px;
      box-shadow: 0 4px 18px rgba(0,0,0,.6);
      animation: tin .15s ease;
    }
    .toast.ok  { border-color: #507030; color: var(--ok); }
    .toast.err { border-color: #803030; color: var(--danger); }
    @keyframes tin { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

    select option, select optgroup { background: #222220; }

    /* ── DEBUG LOG PANEL ───────────────────────────────────────── */
    #log-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 35vh; z-index: 10000;
      background: rgba(18,18,16,.98);
      border-top: 2px solid #c06010;
      display: flex; flex-direction: column;
      font-family: var(--mono); font-size: 10px;
      cursor: pointer;
    }
    #log-panel.hidden { display: none; }
    #log-toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px; border-bottom: 1px solid #2a2a28;
      flex-shrink: 0; background: #1e1e1c;
    }
    #log-toolbar span { font-size: 8px; letter-spacing: 2px; color: #585848; }
    #log-copy, #log-clear {
      font-family: var(--mono); font-size: 8px; letter-spacing: 1px;
      background: transparent; border: 1px solid #383830;
      padding: 2px 8px; border-radius: 2px; cursor: pointer;
    }
    #log-copy { color: #c06010; border-color: #583010; }
    #log-clear { color: #585848; }
    #log-entries {
      flex: 1; overflow-y: auto; padding: 4px 8px;
      user-select: text; -webkit-user-select: text;
    }
    #log-entries::-webkit-scrollbar { width: 4px; }
    #log-entries::-webkit-scrollbar-thumb { background: #383830; border-radius: 2px; }
    .log-line {
      padding: 1px 0; line-height: 1.5;
      border-bottom: 1px solid rgba(255,255,255,.02);
      word-break: break-all; white-space: pre-wrap;
    }
    .log-line.log  { color: #686858; }
    .log-line.warn { color: #e8b820; }
    .log-line.err  { color: #e83030; }
    .log-line.info { color: #c08040; }
    #log-toggle {
      font-family: var(--mono); font-size: 8px; letter-spacing: 1px;
      background: transparent; color: #585848;
      border: 1px solid #383830; padding: 3px 8px;
      border-radius: 2px; cursor: pointer; transition: all .1s;
    }
    #log-toggle:hover { color: var(--text); border-color: #585848; }

  </style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
//  ─────────────────────────────────────────────────────────────
//  Everything is served from ONE origin: beat-backend-5nnu.onrender.com
//  Discord portal URL mapping:  /  →  beat-backend-5nnu.onrender.com
//
//  No split between GitHub Pages and Render anymore.
//  Relative paths always work because the page and the API
//  are on the same server.
//
//    fetch("/api/config")        → Render /api/config        ✓
//    fetch("/.proxy/api/config") → same thing via proxy      ✓
//    io({ path:"/api/socketio" }) → Render /api/socketio     ✓
// ═══════════════════════════════════════════════════════════════
const _hostname  = location.hostname;
const _href      = location.href;
// In Discord: served via discordsays.com proxy → relative paths work
// In browser: served directly from Render → relative paths work
// Either way, relative paths are correct. No full URL needed.
const IN_DISCORD = _hostname.endsWith(".discordsays.com")
                || _hostname === "discordsays.com";

const RENDER_URL  = "https://beat-backend-5nnu.onrender.com";

// Always use relative paths — works both in Discord and direct browser access
const API_BASE        = "/api";
const SOCKET_PATH     = "/api/socketio";
const SOCKETIO_SCRIPT = "/api/socketio/socket.io.js";

// All functions assigned to window directly — true globals accessible from
// inline onclick="..." attributes in Discord's strict WebView environment.
// (Script-scoped const/var are NOT visible to inline event handlers in Discord.)
var W = window; // keep W as alias for internal use

// ═══════════════════════════════════════════════════════════════
//  IN-PAGE LOGGER — runs first, catches everything
// ═══════════════════════════════════════════════════════════════
// Stub W.toggleLog immediately so the button onclick never
// calls undefined, even if the logger body below throws.
W.toggleLog = W.copyLogs = W.clearLogs = function(){};

try { (function(){

  var worstLevel = 0; // 0=none 1=warn 2=err
  var MAX        = 300;

  // --- safe console save (no .bind which can throw on native fns) ---
  var _log   = function(){ try{ Function.prototype.apply.call(console.log,   console, arguments); }catch(e){} };
  var _warn  = function(){ try{ Function.prototype.apply.call(console.warn,  console, arguments); }catch(e){} };
  var _error = function(){ try{ Function.prototype.apply.call(console.error, console, arguments); }catch(e){} };
  var _info  = function(){ try{ Function.prototype.apply.call(console.info,  console, arguments); }catch(e){} };

  // --- timestamp without padStart ---
  function ts(){
    try{
      var d=new Date();
      function p(n){ return (n<10?"0":"")+n; }
      function p3(n){ return (n<10?"00":(n<100?"0":""))+n; }
      return p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds())+"."+p3(d.getMilliseconds());
    }catch(e){ return "??:??:??.???"; }
  }

  // --- format arguments without Array.from ---
  function fmt(args){
    try{
      var parts=[];
      for(var i=0;i<args.length;i++){
        var a=args[i];
        if(a===null){ parts.push("null"); continue; }
        if(a===undefined){ parts.push("undefined"); continue; }
        if(typeof a==="string"){ parts.push(a); continue; }
        try{ parts.push(JSON.stringify(a)); }catch(e){ parts.push(typeof a); }
      }
      return parts.join(" ");
    }catch(e){ return "[fmt error]"; }
  }

  // --- add a line to the panel ---
  function addLine(level, text){
    try{
      var el=document.getElementById("log-entries");
      if(!el) return;
      var line=document.createElement("div");
      line.className="log-line "+level;
      line.textContent="["+ts()+"] "+text;
      el.appendChild(line);
      // trim oldest
      while(el.childNodes.length>MAX && el.firstChild) el.removeChild(el.firstChild);
      // scroll to bottom
      el.scrollTop=99999999;
    }catch(e){}

    // update button colour on both the overlay button and the transport button
    try{
      var lv = (level==="err"?2:level==="warn"?1:0);
      if(lv>worstLevel){
        worstLevel=lv;
        var clr = lv===2?"#ff3060":"#ffb800";
        var ids = ["log-toggle","ov-log-btn"];
        for(var bi=0;bi<ids.length;bi++){
          var btn=document.getElementById(ids[bi]);
          if(btn){ btn.style.color=clr; btn.style.borderColor=clr; }
        }
      }
    }catch(e){}
  }

  // --- intercept console — wrapped so a throw can't kill the page ---
  try{ console.log  =function(){ _log.apply(null,arguments);  addLine("log", fmt(arguments)); }; }catch(e){}
  try{ console.warn =function(){ _warn.apply(null,arguments); addLine("warn",fmt(arguments)); }; }catch(e){}
  try{ console.error=function(){ _error.apply(null,arguments);addLine("err", fmt(arguments)); }; }catch(e){}
  try{ console.info =function(){ _info.apply(null,arguments); addLine("info",fmt(arguments)); }; }catch(e){}

  // catch uncaught errors
  try{
    window.addEventListener("error",function(e){
      addLine("err","UNCAUGHT: "+(e.message||"?")+" ("+e.filename+":"+e.lineno+")");
    });
    window.addEventListener("unhandledrejection",function(e){
      var m="?"; try{ m=e.reason&&e.reason.message?e.reason.message:String(e.reason); }catch(x){}
      // Suppress known SDK postMessage noise — harmless, fires after authenticate() resolves
      if(m.indexOf("postMessage")!==-1 || m.indexOf("call stack")!==-1) return;
      addLine("err","PROMISE: "+m);
    });
  }catch(e){}

  // tap the panel to hide, tap the log button in transport bar to show again
  W.toggleLog=function(){
    try{
      var panel=document.getElementById("log-panel");
      if(!panel) return;
      if(panel.classList.contains("hidden")){
        panel.classList.remove("hidden");
        var el=document.getElementById("log-entries");
        if(el) el.scrollTop=99999999;
      } else {
        panel.classList.add("hidden");
      }
      worstLevel=0;
      var ids=["log-toggle","ov-log-btn"];
      for(var bi=0;bi<ids.length;bi++){
        var btn=document.getElementById(ids[bi]);
        if(btn){ btn.style.color=""; btn.style.borderColor=""; }
      }
    }catch(e){}
  };

  W.copyLogs=function(){
    try{
      var el=document.getElementById("log-entries");
      var lines=[]; var kids=el.childNodes;
      for(var i=0;i<kids.length;i++) lines.push(kids[i].textContent||"");
      var text=lines.join("\n");
      if(window.navigator&&window.navigator.clipboard&&window.navigator.clipboard.writeText){
        window.navigator.clipboard.writeText(text).catch(function(){
          try{ window.prompt("Copy:",text); }catch(x){}
        });
      } else {
        try{ window.prompt("Copy:",text); }catch(x){}
      }
    }catch(e){}
  };

  W.clearLogs=function(){
    try{
      var el=document.getElementById("log-entries");
      if(el) el.innerHTML="";
      worstLevel=0;
    }catch(e){}
  };

  // first lines — show environment immediately on every load
  addLine("info","HOSTNAME: " + _hostname);
  addLine("info","HREF:     " + _href.slice(0,80));
  addLine("info","IN_DISC:  " + IN_DISCORD);
  addLine("info","API_BASE: " + API_BASE);
  addLine("info","SOCKPATH: " + SOCKET_PATH);
  addLine("info","IOSRC:    " + SOCKETIO_SCRIPT);
  if(IN_DISCORD){
    addLine("warn","CHECK: Portal mapping order must be /api BEFORE / !")
  }

})(); } catch(outerErr) {
  // If the entire logger IIFE threw, at minimum make the button open a plain alert
  W.toggleLog=function(){ alert("Logger failed to init: "+outerErr); };
}



// ── audio ──────────────────────────────────────────────────────

  "Kick 808","Kick House","Kick Sub","Kick Techno",

  "Hi-Hat Closed","Hi-Hat Open","Ride","Cowbell","Shaker","Rimshot","Sub Drop",

function isDrum(k){ return DRUM_SET.has(k); }
function getSynthFactory(key){
  for(const cat of Object.values(SYNTHS)) if(cat[key]) return cat[key];
  return SYNTHS["KEYS & PIANO"]["Grand Piano"];
}

// ═══════════════════════════════════════════════════════════════
//  AUDIO GRAPH HELPERS
// ═══════════════════════════════════════════════════════════════

// Returns whatever is currently the "master bus input" —
// either masterVerb (if it loaded) or masterComp (dry fallback).
function masterBus(){ return masterVerb || masterComp; }

function buildFxChain(layerId, fxState){
  const old = fxMap[layerId];
  if(old){ for(const n of Object.values(old)){ try{n.dispose();}catch(_){} } }

  const fx = fxState || { distortion:0, filterFreq:20000, filterType:"lowpass", delayWet:0, delayFeedback:.3, bitcrush:8 };

  const dist   = new Tone.Distortion(fx.distortion || 0);
  const filter = new Tone.Filter({ frequency: fx.filterFreq || 20000, type: fx.filterType || "lowpass" });
  const delay  = new Tone.FeedbackDelay({ delayTime:"8n", feedback: fx.delayFeedback||.3, wet: fx.delayWet||0 });
  const crush  = new Tone.BitCrusher(fx.bitcrush || 8);

  dist.chain(filter, delay, crush, masterBus());
  fxMap[layerId] = { dist, filter, delay, crush };
  return fxMap[layerId];
}

function spawnSynth(layerId, key, fxState){
  const old = synthMap[layerId];
  if(old){ try{old.node.dispose();}catch(_){} }
  if(!masterOut) return null;

  const chain = buildFxChain(layerId, fxState);
  const node  = getSynthFactory(key)();
  node.connect(chain.dist);
  synthMap[layerId] = { key, node, isPlayer: false };
  return synthMap[layerId];
}

function setVol(layerId, db){
  const e = synthMap[layerId]; if(!e) return;
  try{ e.node.volume.value = parseFloat(db); }catch(_){}
}

  el.className = "toast" + (type ? " "+type : "");

function userColor(name){
  let h = 0; for(const c of (name||"?")) h = (h<<5) - h + c.charCodeAt(0);
  return `hsl(${Math.abs(h)%360},65%,62%)`;
}

// ═══════════════════════════════════════════════════════════════
//  BOOT
//  ─────────────────────────────────────────────────────────────
//  All setup (socket, config, Discord SDK) happens here.
//  No audio work happens until the user clicks Enter Studio.
// ═══════════════════════════════════════════════════════════════
var _bootStarted = false;
async function boot(){
  if(_bootStarted){ console.warn("boot() called twice — ignoring"); return; }
  _bootStarted = true;
  ovMsg("LOADING...", 5);

  // ── Step 0: load Tone.js and lamejs ────────────────────────────────────
  // External CDNs are blocked by Discord's CSP — serve from same-origin /api/lib/
  // In browser, cdnjs is fine but we use the same path for consistency.
  function loadScript(src){
    return Promise.race([
      new Promise(function(res, rej){
        var s = document.createElement("script");
        s.src = src;
        s.onload = res;
        s.onerror = function(){ rej(new Error("Failed: " + src)); };
        document.head.appendChild(s);
      }),
      new Promise(function(_, rej){ setTimeout(function(){ rej(new Error("Timeout: " + src)); }, 15000); })
    ]);
  }

  try{
    ovMsg("LOADING TONE.JS...", 8);
    await loadScript("/api/lib/tone");
    console.log("Tone.js loaded, Tone:", typeof Tone);
  }catch(e){ console.warn("Tone.js load failed:", e.message); }

  try{
    await loadScript("/api/lib/lame");
    console.log("lamejs loaded, lamejs:", typeof lamejs);
  }catch(e){ console.warn("lamejs load failed:", e.message); }

  // Log full URLs so we can see exactly what's being fetched
  console.info("IN_DISCORD: " + IN_DISCORD);
  console.info("HOSTNAME:   " + location.hostname);
  console.info("API_BASE:   " + API_BASE);
  console.info("SOCKET_PATH:" + SOCKET_PATH);
  console.info("IOscript:   " + SOCKETIO_SCRIPT);
  console.info("ConfigURL:  " + API_BASE + "/config");

  // ── Step 1: wake up Render early ──────────────────────────────────────────
  try{ fetch(RENDER_URL + "/").catch(function(){}); }catch(e){}

  // ── Step 2: Load Discord SDK ────────────────────────────────────────────
  // SDK is ESM-only — must use dynamic import(). No UMD/script-tag build exists.
  // Served from /api/sdk (our Render backend) to bypass Discord's CSP on external CDNs.
  if(IN_DISCORD && !window._SDKClass){
    ovMsg("LOADING SDK...", 20);
    try{
      var sdkMod = await import("/api/sdk");
      window._SDKClass = sdkMod.DiscordSDK;
      console.log("SDK loaded, DiscordSDK:", typeof window._SDKClass);
    }catch(e){
      console.warn("SDK import failed:", e.message);
    }
  }

  // ── Step 3: load socket.io ──────────────────────────────────────────────
  ovMsg("LOADING SOCKET.IO...", 35);
  await Promise.race([
    new Promise(function(res){
      var s = document.createElement("script");
      s.src = SOCKETIO_SCRIPT;
      s.onload = res;
      s.onerror = function(){ console.warn("socket.io load failed:", SOCKETIO_SCRIPT); res(); };
      document.head.appendChild(s);
    }),
    new Promise(function(res){ setTimeout(res, 8000); })
  ]);
  console.log("socket.io loaded:", typeof io !== "undefined" ? "yes" : "no");

  // ── Step 4: connect socket ──────────────────────────────────────────────
  ovMsg("CONNECTING TO SERVER...", 50);
  if(typeof io !== "undefined"){
    try{
      socket = io({ path:SOCKET_PATH, transports:["polling","websocket"], timeout:15000, reconnectionAttempts:20, reconnectionDelay:2000 });
      setupSocket();
      console.log("Socket init OK");
    }catch(e){ console.warn("Socket init error:", e); }
  } else {
    console.warn("socket.io not available");
  }

  // ── Step 5: fetch client ID ─────────────────────────────────────────────
  ovMsg("FETCHING CONFIG...", 65);
  var configUrl = API_BASE + "/config";
  console.log("Fetching config from: " + configUrl);
  var clientId = null;
  var clientSecret = null;
  try{
    var r = await fetch(configUrl);
    console.log("Config status:", r.status, "type:", r.headers.get("content-type"));
    var j = await r.json();
    clientId     = j.clientId;
    clientSecret = j.clientSecret;
    console.log("clientId:", clientId ? "ok" : "missing", "secret:", clientSecret ? "ok" : "missing");
  }catch(e){ console.warn("Config fetch failed:", e.message); }

  if(IN_DISCORD && clientId && !window._authDone){
    window._authDone = true;
    ovMsg("DISCORD AUTH...", 80);
    try{
      var SDKClass = window._SDKClass;
      if(!SDKClass) throw new Error("DiscordSDK class not found");
      console.log("SDKClass found:", typeof SDKClass);

      if(!discordSdk){
        discordSdk = new SDKClass(clientId);
        console.log("DiscordSDK created");
        await Promise.race([
          discordSdk.ready(),
          new Promise(function(_,rej){ setTimeout(function(){ rej(new Error("SDK ready timeout")); }, 10000); })
        ]);
        console.log("SDK ready");
      }

      var authRes = await discordSdk.commands.authorize({
        client_id: clientId, response_type: "code",
        prompt: "none", scope: ["identify"],
      });
      console.log("Got auth code");

      // Exchange code directly from browser — bypasses Render's rate-limited IP
      var tokenRes = await fetch("https://discord.com/api/oauth2/token", {
        method : "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body   : new URLSearchParams({
          client_id    : clientId,
          client_secret: clientSecret,
          grant_type   : "authorization_code",
          code         : authRes.code,
        }),
      });
      var tokenData = await tokenRes.json();
      console.log("Token exchange status:", tokenRes.status, "has token:", !!tokenData.access_token);
      if(!tokenData.access_token) throw new Error("No access_token: " + JSON.stringify(tokenData));

      var auth = await discordSdk.commands.authenticate({ access_token: tokenData.access_token });
      if(!auth) throw new Error("authenticate() returned null");

      username = auth.user.global_name || auth.user.username;
      userId   = auth.user.id;
      console.log("Authenticated as:", username);
    }catch(e){
      console.warn("Discord auth error (guest mode):", e.message || String(e));
    }
  }

  // Register our identity with the server now that we know who we are
  if(socket && socket.connected){
    socket.emit("register", { name: username, color: userColor(username), userId });
  }

  ovMsg("READY", 100);
  const btn = document.getElementById("enter-btn");
  btn.textContent = "ENTER STUDIO";
  btn.classList.add("ready");
  btn.disabled = false;
  btn.onclick = enterStudio;
}

// Safety net: if boot() stalls for any reason, force-show the Enter button after 12s
setTimeout(function(){
  var btn = document.getElementById("enter-btn");
  if(btn && btn.disabled){
    console.warn("boot() timed out — force-enabling Enter button");
    btn.textContent = "ENTER STUDIO";
    btn.classList.add("ready");
    btn.disabled = false;
    btn.onclick = enterStudio;
    ovMsg("READY (timeout)", 100);
  }
}, 12000);

// ═══════════════════════════════════════════════════════════════
//  ENTER STUDIO
//  ─────────────────────────────────────────────────────────────
//  CRITICAL FIX ORDER:
//  1. Hide overlay IMMEDIATELY (first line) — never block this.
//  2. Update user display.
//  3. Tone.start() with timeout — may not fully resume in iframe,
//     that's OK, we'll show the unlock banner.
//  4. Build master audio graph WITHOUT awaiting Reverb.generate().
//     Tone.Reverb constructor calls OfflineAudioContext internally
//     and can hang forever in Discord's iframe. We create it,
//     connect it immediately, and let it warm up asynchronously.
//     If it stalls beyond 1.5s we fall back to a dry path.
//  5. Start sequencer loop + build UI.
// ═══════════════════════════════════════════════════════════════
async function enterStudio(){
  // ★ ALWAYS hide overlay first — before anything that could throw ★
  var overlay = document.getElementById("overlay");
  if(overlay) overlay.style.display = "none";

  try{
    // Step 2 — user display
    var col = userColor(username);
    document.getElementById("user-disp").textContent = "" + username;
    document.getElementById("user-disp").style.color = col;
  }catch(e){ console.warn("user display err:", e.message); }

  // Step 3 — start AudioContext (requires user gesture)
  if(typeof Tone === "undefined"){
    console.warn("Tone.js not loaded — audio disabled");
    audioReady = false;
  } else {
    try{
      await Promise.race([
        Tone.start(),
        new Promise(function(r){ setTimeout(r, 2500); })
      ]);
      console.log("Tone started, context:", Tone.context.state);
    }catch(e){ console.warn("Tone.start:", e.message); }

    // Step 4 — build master audio graph
    try{
      masterComp = new Tone.Compressor({ threshold:-18, ratio:4, attack:.003, release:.25 });
      masterOut  = new Tone.Gain(0.82).toDestination();
      masterComp.connect(masterOut);
      recorder   = new Tone.Recorder();
      masterOut.connect(recorder);
    }catch(e){ console.warn("Master graph err:", e.message); }

    // Reverb — skip if AudioContext still suspended (common in Discord)
    try{
      if(Tone.context.state !== "suspended"){
        var verbCandidate = new Tone.Reverb({ decay:2.2, wet:0.15 });
        verbCandidate.connect(masterComp);
        masterVerb = verbCandidate;
      }
    }catch(e){
      console.warn("Reverb init failed, dry path:", e.message);
      masterVerb = null;
    }

    audioReady = true;
    console.log("audioReady = true");

    // Step 5 — audio unlock banner
    try{
      if(Tone.context.state === "suspended"){
        document.getElementById("audio-unlock").style.display = "block";
        document.addEventListener("click",      function(){ doUnlockAudio(); }, { once:true });
        document.addEventListener("touchstart", function(){ doUnlockAudio(); }, { once:true });
      }
    }catch(e){}
  }

  try{ startLoop(); }catch(e){ console.warn("startLoop err:", e.message); }
  try{ buildUI();   }catch(e){ console.warn("buildUI err:",   e.message); }
}

// ═══════════════════════════════════════════════════════════════
//  SEQUENCER LOOP
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
//  SEQUENCER — driven by server "tick" events for tight sync
//  Each "tick" from the server = one 32nd note.
//  Audio is triggered immediately on tick receipt using Tone.now().
// ═══════════════════════════════════════════════════════════════
function startLoop(){
  // No-op: sequencer is now driven by socket "tick" events in setupSocket()
  // Tone.Transport is only used for AudioContext timing (not scheduling)
  try{ Tone.Transport.start(); }catch(_){}
}

function fireTick(t){
  if(!audioReady || !playing) return;
  const beat = getActiveBeat();
  if(!beat) return;

  const now = Tone.now();
  beat.layers.forEach(function(layer){
    if(mutedSet.has(layer.id)) return;
    if(soloId && soloId !== layer.id) return;

    const mult = layer.bpmMult || 1;
    const div  = Math.max(1, Math.round(2/mult));
    if(t % div !== 0) return;

    const step = Math.floor(t/div) % S.steps;
    if(!layer.pattern || !layer.pattern[step]) return;

    const inst = synthMap[layer.id];
    if(!inst) return;
    try{
      if(inst.isPlayer){ inst.node.stop(now); inst.node.start(now); }
      else{ inst.node.triggerAttackRelease(layer.note||"C4","16n",now); }
    }catch(_){}
  });

  // Draw head one step ahead so the highlight is centered on the button
  // when the audio fires (accounts for audio output latency)
  drawHead(t + 1);
}

function drawHead(t){
  const beat = getActiveBeat(); if(!beat) return;
  beat.layers.forEach(function(layer){
    const btns = layerBtns[layer.id]; if(!btns) return;
    const div  = Math.max(1, Math.round(2/(layer.bpmMult||1)));
    const step = Math.floor(t/div) % S.steps;
    btns.forEach(function(b,i){ i===step ? b.classList.add("hd") : b.classList.remove("hd"); });
  });
}

// ═══════════════════════════════════════════════════════════════
//  UI BUILD
// ═══════════════════════════════════════════════════════════════
function buildUI(){
  document.getElementById("proj-name").textContent = S.projectName;
  document.getElementById("bpm-sl").value = S.bpm;
  document.getElementById("bpm-val").textContent = S.bpm;
  document.getElementById("step-sel").value = S.steps;
  if(audioReady){ try{ Tone.Transport.bpm.value = S.bpm; }catch(_){} }
  buildBeatTabs();
  buildRack();
}

function buildBeatTabs(){
  const wrap = document.getElementById("beat-tabs");
  wrap.innerHTML = "";
  S.beats.forEach(beat=>{
    const tab = document.createElement("button");
    tab.className = "beat-tab" + (beat.id===S.activeBeat?" active":"");

    const ns = document.createElement("span");
    ns.textContent = beat.name;
    ns.ondblclick = e=>{
      e.stopPropagation();
      const inp = document.createElement("input");
      inp.value = beat.name;
      inp.style.cssText = "font-family:var(--mono);font-size:9px;background:transparent;color:var(--text);border:none;outline:none;width:70px";
      inp.onclick = e=>e.stopPropagation();
      inp.onblur  = ()=>{ if(inp.value.trim()) socket.emit("renameBeat",{beatId:beat.id,name:inp.value.trim()}); };
      inp.onkeydown = e=>{ if(e.key==="Enter") inp.blur(); if(e.key==="Escape"){inp.value=beat.name;inp.blur();} };
      ns.replaceWith(inp); inp.focus(); inp.select();
    };
    tab.onclick = ()=>socket.emit("switchBeat", beat.id);
    tab.appendChild(ns);

    if(S.beats.length > 1){
      const del = document.createElement("button");
      del.className = "ibtn bt-del del"; del.textContent = "X";
      del.onclick = e=>{ e.stopPropagation(); if(confirm('Delete "'+beat.name+'"?')) socket.emit("deleteBeat",beat.id); };
      tab.appendChild(del);
    }
    wrap.appendChild(tab);
  });
}

function buildRack(){
  const rack = document.getElementById("rack");
  rack.innerHTML = ""; layerBtns = {};

  const beat = getActiveBeat(); if(!beat) return;

  // Sync synth nodes only when audio is ready
  if(audioReady){
    beat.layers.forEach(layer=>{
      const ex = synthMap[layer.id];
      if(!ex){
        if(layer.inst !== "__CUSTOM__")
          spawnSynth(layer.id, layer.inst||"Grand Piano", layer.fx);
      } else if(!ex.isPlayer && ex.key !== (layer.inst||"Grand Piano")){
        spawnSynth(layer.id, layer.inst||"Grand Piano", layer.fx);
      }
      setVol(layer.id, (layer.vol != null ? layer.vol : -6));
    });
    // Prune orphan synth nodes
    for(const id of Object.keys(synthMap)){
      if(!beat.layers.find(l=>l.id===id)){
        try{ synthMap[id].node.dispose(); }catch(_){}
        const fc = fxMap[id];
        if(fc) for(const n of Object.values(fc)){ try{n.dispose();}catch(_){} }
        delete synthMap[id]; delete fxMap[id];
      }
    }
  }

  beat.layers.forEach(layer=>buildLayerRow(rack, beat, layer));

  const addBtn = document.createElement("button");
  addBtn.className = "add-layer";
  addBtn.textContent = "+ ADD LAYER";
  addBtn.onclick = ()=>socket && socket.emit("addLayer",{ beatId:beat.id, author:username });
  rack.appendChild(addBtn);
}

function buildLayerRow(rack, beat, layer){
  const col    = userColor(layer.author||username);
  const muted  = mutedSet.has(layer.id);
  const soloed = soloId === layer.id;
  const drum   = isDrum(layer.inst);
  const fx     = layer.fx || {};

  const row = document.createElement("div"); row.className = "lrow";

  // ── CONTROL PANEL ──────────────────────────────────────────
  const ctrl = document.createElement("div"); ctrl.className = "lctrl";
  ctrl.style.borderLeft = "2px solid " + col;

  // hdr: author | label | actions
  const hdr = document.createElement("div"); hdr.className = "lhdr";

  const authorEl = document.createElement("span"); authorEl.className = "l-author";
  authorEl.textContent = layer.author||username; authorEl.style.color = col;

  const labelInp = document.createElement("input"); labelInp.className = "l-label";
  labelInp.value = layer.label||""; labelInp.placeholder = "label...";
  labelInp.onchange = ()=>socket && socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"label",value:labelInp.value});

  const acts = document.createElement("div"); acts.className = "l-acts";

  const muteBtn = document.createElement("button");
  muteBtn.className = "ibtn"+(muted?" muted":""); muteBtn.title="Mute"; muteBtn.textContent="M";
  muteBtn.onclick = ()=>{ mutedSet.has(layer.id)?mutedSet.delete(layer.id):mutedSet.add(layer.id); buildRack(); };

  const soloBtn = document.createElement("button");
  soloBtn.className = "ibtn"+(soloed?" soloed":""); soloBtn.title="Solo"; soloBtn.textContent="S";
  soloBtn.onclick = ()=>{ soloId = (soloId===layer.id)?null:layer.id; buildRack(); };

  const dupBtn = document.createElement("button");
  dupBtn.className = "ibtn"; dupBtn.title="Duplicate"; dupBtn.textContent="DUPE";
  dupBtn.onclick = ()=>socket && socket.emit("duplicateLayer",{beatId:beat.id,layerId:layer.id});

  const delBtn = document.createElement("button");
  delBtn.className = "ibtn del"; delBtn.title="Remove"; delBtn.textContent="X";
  delBtn.onclick = ()=>socket && socket.emit("removeLayer",{beatId:beat.id,layerId:layer.id});

  acts.append(muteBtn, soloBtn, dupBtn, delBtn);
  hdr.append(authorEl, labelInp, acts);
  ctrl.appendChild(hdr);

  // r1: instrument select + note select + sample btn
  const r1 = document.createElement("div"); r1.className = "lrow1";

  const instSel = document.createElement("select"); instSel.className = "isel";
  for(const [cat, entries] of Object.entries(SYNTHS)){
    const grp = document.createElement("optgroup"); grp.label = cat;
    for(const name of Object.keys(entries)){
      const o = document.createElement("option"); o.value = o.textContent = name;
      if((layer.inst||"Grand Piano") === name) o.selected = true;
      grp.appendChild(o);
    }
    instSel.appendChild(grp);
  }
  {
    const grp = document.createElement("optgroup"); grp.label = "CUSTOM SAMPLE";
    const o   = document.createElement("option");   o.value = "__CUSTOM__";
    o.textContent = customMap[layer.id] ? ""+customMap[layer.id].name : "Upload sample...";
    if(layer.inst === "__CUSTOM__") o.selected = true;
    grp.appendChild(o); instSel.appendChild(grp);
  }

  const fileInp = document.createElement("input");
  fileInp.type="file"; fileInp.accept="audio/*"; fileInp.style.display="none";
  fileInp.onchange = async()=>{
    const file = fileInp.files[0]; if(!file) return;
    const url  = URL.createObjectURL(file);
    const old  = synthMap[layer.id]; if(old){ try{old.node.dispose();}catch(_){} }
    buildFxChain(layer.id, fx);
    const player = new Tone.Player({url,loop:false}).connect(fxMap[layer.id].dist);
    await Tone.loaded();
    player.volume.value = (layer.vol != null ? layer.vol : -6);
    synthMap[layer.id]  = {key:"__CUSTOM__", node:player, isPlayer:true};
    customMap[layer.id] = {url, name:file.name};
    layer.inst = "__CUSTOM__";
    socket && socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"inst",value:"__CUSTOM__"});
    toast("Sample: "+file.name, "ok"); buildRack();
  };

  instSel.onchange = ()=>{
    const val = instSel.value;
    if(val === "__CUSTOM__"){ fileInp.click(); instSel.value = layer.inst||"Grand Piano"; return; }
    layer.inst = val;
    spawnSynth(layer.id, val, fx);
    setVol(layer.id, (layer.vol != null ? layer.vol : -6));
    socket && socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"inst",value:val});
    buildRack();
  };

  const noteSel = document.createElement("select"); noteSel.className = "msel";
  noteSel.style.cssText = "width:58px;display:"+(drum?"none":"");
  NOTES.forEach(n=>{
    const o = document.createElement("option"); o.value = o.textContent = n;
    if((layer.note||"C4") === n) o.selected = true;
    noteSel.appendChild(o);
  });
  noteSel.onchange = ()=>{
    layer.note = noteSel.value;
    socket && socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"note",value:noteSel.value});
  };

  const sampBtn = document.createElement("button");
  sampBtn.className = "samp"+(customMap[layer.id]?" loaded":"");
  sampBtn.title="Upload sample"; sampBtn.textContent="LOAD";
  sampBtn.onclick = ()=>fileInp.click();

  r1.append(instSel, noteSel, sampBtn, fileInp);
  ctrl.appendChild(r1);

  // r2: speed slider + volume slider
  const r2 = document.createElement("div"); r2.className = "lrow2";

  const SPEED_VALS = [0.25,0.33,0.5,0.75,1,1.5,2,3,4];
  const STEP_SIZE  = 100 / (SPEED_VALS.length - 1);
  function spdToSliderVal(mult){
    let best=4, bd=99;
    SPEED_VALS.forEach((v,i)=>{ if(Math.abs(v-mult)<bd){bd=Math.abs(v-mult);best=i;} });
    return Math.round(best * STEP_SIZE);
  }
  function sliderValToSpd(v){ return SPEED_VALS[Math.round(v/STEP_SIZE)] || 1; }

  const spdRow = document.createElement("div"); spdRow.className = "sl-row"; spdRow.style.flex = "0 0 130px";
  const spdLbl = document.createElement("span"); spdLbl.className="sl-lbl"; spdLbl.textContent="SPD";
  const spdSl  = document.createElement("input"); spdSl.type="range"; spdSl.min=0; spdSl.max=100; spdSl.step=1;
  spdSl.value  = spdToSliderVal(layer.bpmMult||1);
  const spdNum = document.createElement("span"); spdNum.className="sl-num"; spdNum.textContent=(layer.bpmMult||1)+"×";
  spdSl.addEventListener("input",  ()=>{ const m=sliderValToSpd(+spdSl.value); spdNum.textContent=m+"×"; layer.bpmMult=m; });
  spdSl.addEventListener("change", ()=>{ const m=sliderValToSpd(+spdSl.value); layer.bpmMult=m; socket && socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"bpmMult",value:m}); });
  spdRow.append(spdLbl, spdSl, spdNum);

  const volRow = document.createElement("div"); volRow.className = "sl-row";
  const volLbl = document.createElement("span"); volLbl.className="sl-lbl"; volLbl.textContent="VOL";
  const volSl  = document.createElement("input"); volSl.type="range"; volSl.min=-36; volSl.max=6; volSl.value=(layer.vol != null ? layer.vol : -6);
  const volNum = document.createElement("span"); volNum.className="sl-num"; volNum.textContent=((layer.vol != null ? layer.vol : -6))+"dB";
  volSl.addEventListener("input",  ()=>{ const v=+volSl.value; volNum.textContent=v+"dB"; setVol(layer.id,v); });
  volSl.addEventListener("change", ()=>{ const v=+volSl.value; layer.vol=v; socket && socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"vol",value:v}); });
  volRow.append(volLbl, volSl, volNum);

  r2.append(spdRow, volRow);
  ctrl.appendChild(r2);

  // r3: FX sliders — DIST, FILT, DLY, CRUSH — no wrapping
  const r3 = document.createElement("div"); r3.className = "lrow3";

  function makeFxSl(lbl, min, max, val, fmt, onChange){
    const wrap = document.createElement("div"); wrap.className="sl-row";
    const l    = document.createElement("span"); l.className="sl-lbl"; l.textContent=lbl;
    const sl   = document.createElement("input"); sl.type="range"; sl.min=min; sl.max=max; sl.value=val; sl.step=1;
    const num  = document.createElement("span"); num.className="sl-num"; num.textContent=fmt(val);
    sl.addEventListener("input",  ()=>{ num.textContent=fmt(+sl.value); onChange(+sl.value,false); });
    sl.addEventListener("change", ()=>{ onChange(+sl.value,true); });
    wrap.append(l, sl, num); return wrap;
  }

  r3.appendChild(makeFxSl("DIST",0,100,Math.round((fx.distortion||0)*100),v=>v+"%",(v,send)=>{
    fx.distortion = v/100;
    const c = fxMap[layer.id]; if(c) c.dist.distortion = v/100;
    if(send){ layer.fx=fx; socket&&socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"fx",value:fx}); }
  }));

  const initFP = Math.round(Math.log10((fx.filterFreq||20000)/200)/Math.log10(100)*100);
  r3.appendChild(makeFxSl("FILT",1,100,initFP,v=>{
    const hz=Math.round(200*Math.pow(100,v/100));
    return hz>=1000?(hz/1000).toFixed(1)+"k":hz+"Hz";
  },(v,send)=>{
    const hz=Math.round(200*Math.pow(100,v/100));
    fx.filterFreq=hz;
    const c=fxMap[layer.id]; if(c) c.filter.frequency.value=hz;
    if(send){ layer.fx=fx; socket&&socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"fx",value:fx}); }
  }));

  r3.appendChild(makeFxSl("DLY",0,100,Math.round((fx.delayWet||0)*100),v=>v+"%",(v,send)=>{
    fx.delayWet=v/100;
    const c=fxMap[layer.id]; if(c) c.delay.wet.value=v/100;
    if(send){ layer.fx=fx; socket&&socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"fx",value:fx}); }
  }));

  r3.appendChild(makeFxSl("CRUSH",1,8,fx.bitcrush||8,v=>v===8?"OFF":v+"b",(v,send)=>{
    fx.bitcrush=v;
    const c=fxMap[layer.id]; if(c){ try{c.crush.bits=v;}catch(_){} }
    if(send){ layer.fx=fx; socket&&socket.emit("updateLayer",{beatId:beat.id,layerId:layer.id,key:"fx",value:fx}); }
  }));

  ctrl.appendChild(r3);
  row.appendChild(ctrl);

  // ── STEP BUTTONS ─────────────────────────────────────────
  const stepsEl = document.createElement("div"); stepsEl.className = "steps";
  layerBtns[layer.id] = [];
  const onColor = drum ? col : "var(--accent)";

  (layer.pattern||[]).forEach((active,i)=>{
    if(i > 0 && i%4 === 0){
      const g = document.createElement("div"); g.className="sgap"; stepsEl.appendChild(g);
    }
    const btn = document.createElement("button");
    btn.className = "sbtn " + (Math.floor(i/4)%2===0?"d0":"d1") + (active?" on":"");
    if(active) btn.style.background = onColor;
    btn.onclick = ()=>{
      const cur = layer.pattern[i];
      layer.pattern[i] = !cur;
      btn.style.background = layer.pattern[i] ? onColor : "";
      layer.pattern[i] ? btn.classList.add("on") : btn.classList.remove("on");
      socket && socket.emit("toggleStep",{beatId:beat.id,layerId:layer.id,stepIndex:i,val:layer.pattern[i]});
    };
    stepsEl.appendChild(btn);
    layerBtns[layer.id].push(btn);
  });

  row.appendChild(stepsEl);
  rack.appendChild(row);
}

// ═══════════════════════════════════════════════════════════════
//  SOCKET EVENTS
// ═══════════════════════════════════════════════════════════════
function setupSocket(){
  socket.on("connect", function(){
    var transport = "unknown";
    try{ transport = socket.io.engine.transport.name; }catch(e){}
    console.log("Socket connected. id:", socket.id, "transport:", transport);
    document.getElementById("status").textContent = "LIVE";
    document.getElementById("status").classList.add("live");
    // Register identity whenever we (re)connect
    socket.emit("register", { name: username, color: userColor(username), userId });
  });

  socket.on("disconnect", function(reason){
    console.warn("Socket disconnected:", reason);
    document.getElementById("status").textContent = "OFFLINE";
    document.getElementById("status").classList.remove("live");
  });

  socket.on("connect_error", function(err){
    console.warn("Socket connect_error:", err.message, "| type:", err.type, "| description:", err.description);
    document.getElementById("status").textContent = "OFFLINE";
    document.getElementById("status").classList.remove("live");
  });

  socket.io.on("reconnect", function(attempt){
    console.log("Socket reconnected after", attempt, "attempts");
  });

  socket.io.on("reconnect_error", function(err){
    console.warn("Socket reconnect_error:", err.message);
  });

  socket.io.on("reconnect_failed", function(){
    console.warn("Socket gave up reconnecting after all attempts");
  });

  socket.on("state", ns=>{
    S = ns;
    if(audioReady){
      try{ Tone.Transport.bpm.value = S.bpm; }catch(_){}
      buildUI();
    } else {
      document.getElementById("proj-name").textContent = S.projectName;
      document.getElementById("bpm-val").textContent   = S.bpm;
    }
  });

  socket.on("stepToggled", ({beatId,layerId,stepIndex,val})=>{
    const beat = S.beats.find(b=>b.id===beatId); if(!beat) return;
    const layer = beat.layers.find(l=>l.id===layerId); if(!layer) return;
    layer.pattern[stepIndex] = val;
    const btns = layerBtns[layerId]; if(!btns||!btns[stepIndex]) return;
    const onColor = isDrum(layer.inst) ? userColor(layer.author||username) : "var(--accent)";
    btns[stepIndex].style.background = val ? onColor : "";
    val ? btns[stepIndex].classList.add("on") : btns[stepIndex].classList.remove("on");
  });

  // FIX: handle layerParamUpdate that the server emits for vol changes
  socket.on("layerParamUpdate", ({beatId, layerId, key, value})=>{
    const beat = S.beats.find(b=>b.id===beatId); if(!beat) return;
    const layer = beat.layers.find(l=>l.id===layerId); if(!layer) return;
    layer[key] = value;
    if(key === "vol") setVol(layerId, value);
    else if(audioReady) buildUI(); // inst/note/label changes need a full rebuild
  });

  socket.on("playUpdate", function(data){
    var p          = (typeof data === "object") ? data.playing : data;
    var serverTick = (typeof data === "object") ? (data.tick || 0) : 0;
    playing = p;
    const btn = document.getElementById("play-btn");
    if(p){
      tick32 = serverTick;
      btn.textContent = "PAUSE"; btn.classList.add("on");
      if(audioReady){
        try{ Tone.Transport.start(); }catch(_){}
        if(Tone.context.state === "suspended") doUnlockAudio();
      }
    } else {
      tick32 = 0;
      if(audioReady){ try{ Tone.Transport.stop(); }catch(_){} }
      btn.textContent = "PLAY"; btn.classList.remove("on");
      // Clear playhead
      Object.values(layerBtns).forEach(function(btns){ btns.forEach(function(b){ b.classList.remove("hd"); }); });
    }
  });

  // Server tick — fire sequencer step on each tick for tight sync
  socket.on("tick", function(t){
    tick32 = t;
    fireTick(t);
  });

  socket.on("bpmUpdate", v=>{
    S.bpm = v;
    if(audioReady){ try{ Tone.Transport.bpm.value = v; }catch(_){} }
    document.getElementById("bpm-sl").value = v;
    document.getElementById("bpm-val").textContent = v;
  });

  socket.on("projectList", function(list){
    const sel = document.getElementById("proj-loader");
    const cur = sel.value;
    sel.innerHTML = '<option value="">LOAD PROJECT...</option>';
    // list is now array of {name, bpm, beats, savedAt, savedBy}
    (Array.isArray(list) ? list : list.map(n=>({name:n}))).forEach(function(proj){
      const o = document.createElement("option");
      const name = proj.name || proj;
      o.value = name;
      const meta = proj.bpm ? ` (${proj.bpm}bpm, ${proj.beats}b)` : "";
      o.textContent = name + meta;
      sel.appendChild(o);
    });
    if(cur) sel.value = cur;
  });

  socket.on("userCount", function(c){
    var el = document.getElementById("users");
    if(el) el.textContent = c;
    var badge = document.getElementById("users-badge");
    if(badge){ badge.className = "users-badge" + (c > 1 ? " has-users" : ""); }
  });

  socket.on("userList", function(list){
    var el = document.getElementById("users");
    if(el) el.textContent = list.length;
    var badge = document.getElementById("users-badge");
    if(badge) badge.className = "users-badge" + (list.length > 1 ? " has-users" : "");
    var panel = document.getElementById("users-list");
    if(!panel) return;
    panel.innerHTML = "";
    list.forEach(function(u){
      var row = document.createElement("div");
      row.className = "user-entry";
      var dot = document.createElement("div");
      dot.className = "user-dot";
      dot.style.background = u.color || "#e87820";
      var name = document.createElement("span");
      name.textContent = u.name || "Guest";
      name.style.color = u.color || "#e0d0c0";
      row.appendChild(dot);
      row.appendChild(name);
      if(u.name === username){
        var you = document.createElement("span");
        you.className = "user-you";
        you.textContent = "YOU";
        row.appendChild(you);
      }
      panel.appendChild(row);
    });
  });

  socket.on("toast", function(msg, type){ toast(msg, type||""); });
}

// ═══════════════════════════════════════════════════════════════
//  TRANSPORT
// ═══════════════════════════════════════════════════════════════
W.togglePlay     = ()=>socket && socket.emit("togglePlay", !playing);
W.stopTransport  = ()=>{
  if(socket) socket.emit("togglePlay", false);
  tick32 = 0;
  if(audioReady){ try{ Tone.Transport.stop(); Tone.Transport.position = 0; }catch(_){} }
  Object.values(layerBtns).forEach(btns=>btns.forEach(b=>b.classList.remove("hd")));
};
W.clearGrid  = ()=>{ const b=getActiveBeat(); if(b&&socket) socket.emit("clearGrid",b.id); };
W.bpmUI      = v=>{ document.getElementById("bpm-val").textContent=v; if(audioReady){ try{ Tone.Transport.bpm.value=v; }catch(_){} } };
W.sendBPM    = v=>socket && socket.emit("setBPM", v);
W.changeSteps= v=>socket && socket.emit("changeSteps", v);
W.setReverb  = v=>{
  document.getElementById("reverb-val").textContent = v+"%";
  if(masterVerb) masterVerb.wet.value = v/100;
};

// ═══════════════════════════════════════════════════════════════
//  PROJECT SAVE / LOAD / EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════
W.saveProject = ()=>{
  const n = prompt("Save as:", S.projectName);
  if(!n || !n.trim() || !socket) return;
  socket.emit("saveProject", n.trim());
  // Also persist to localStorage so projects survive server restarts
  try{
    const key = "sleezy_project_" + n.trim();
    localStorage.setItem(key, JSON.stringify({ ...S, savedAt: Date.now() }));
    const index = JSON.parse(localStorage.getItem("sleezy_index") || "[]");
    if(!index.includes(n.trim())){ index.push(n.trim()); localStorage.setItem("sleezy_index", JSON.stringify(index)); }
  }catch(e){}
};

W.renameProject = ()=>{
  const n = prompt("Rename:", S.projectName);
  if(n && n.trim() && socket) socket.emit("renameProject", n.trim());
};

W.loadProject = name=>{
  if(!name) return;
  // Try socket first, fall back to localStorage
  if(socket){
    for(const id of Object.keys(synthMap)){ try{synthMap[id].node.dispose();}catch(_){} }
    Object.values(fxMap).forEach(f=>{ for(const n of Object.values(f)){ try{n.dispose();}catch(_){} } });
    synthMap={}; fxMap={}; customMap={}; mutedSet=new Set(); soloId=null;
    socket.emit("loadProject", name);
  }
  document.getElementById("proj-loader").value = "";
};

// Export the current session state as a .sleezy project file
W.exportProjectFile = ()=>{
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    exportedBy: username,
    ...S,
  };
  const json = JSON.stringify(data, null, 2);
  dlBlob(new Blob([json], {type:"application/json"}), (S.projectName||"session")+".sleezy");
  toast("Project file downloaded","ok");
};

// Import a .sleezy project file
W.importProjectFile = ()=>{
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".sleezy,.json";
  inp.onchange = async()=>{
    const file = inp.files[0]; if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!data.beats || !data.bpm){ toast("Invalid project file","err"); return; }
      // Clean up existing audio nodes
      for(const id of Object.keys(synthMap)){ try{synthMap[id].node.dispose();}catch(_){} }
      Object.values(fxMap).forEach(f=>{ for(const n of Object.values(f)){ try{n.dispose();}catch(_){} } });
      synthMap={}; fxMap={}; customMap={}; mutedSet=new Set(); soloId=null;
      // Push to server so all users get it
      if(socket) socket.emit("importProject", data);
      toast("Imported: "+data.projectName,"ok");
    }catch(e){ toast("Failed to read file: "+e.message,"err"); }
  };
  inp.click();
};

// Load saved projects from localStorage into the dropdown
function loadLocalProjects(){
  try{
    const index = JSON.parse(localStorage.getItem("sleezy_index") || "[]");
    const sel = document.getElementById("proj-loader");
    // Add local projects not already in list
    const existing = Array.from(sel.options).map(o=>o.value);
    index.forEach(name=>{
      if(!existing.includes(name)){
        const o = document.createElement("option");
        o.value = o.textContent = name + " (local)";
        o.dataset.local = "1";
        sel.appendChild(o);
      }
    });
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════════
//  BEATS
// ═══════════════════════════════════════════════════════════════
W.addBeat = ()=>{
  const n = prompt("Beat name:", "Beat "+(S.beats.length+1));
  if(n && n.trim() && socket) socket.emit("addBeat", n.trim());
};

// ═══════════════════════════════════════════════════════════════
//  EXPORT / RECORD
// ═══════════════════════════════════════════════════════════════
W.toggleRecord = async()=>{
  if(!recorder){ toast("Start the studio first","err"); return; }
  if(!recording){
    await recorder.start(); recording = true;
    document.getElementById("rec-btn").textContent = "STOP";
    document.getElementById("rec-btn").classList.add("on");
    toast("Recording...");
  } else {
    recording = false;
    const blob = await recorder.stop();
    document.getElementById("rec-btn").textContent = "RECORD";
    document.getElementById("rec-btn").classList.remove("on");
    await processExport(blob);
  }
};

W.exportAudio = async()=>{
  if(!recorder){ toast("Start the studio first","err"); return; }
  if(recording){ toast("Stop recording first","err"); return; }
  if(!playing){ toast("Press PLAY first, then EXPORT","err"); return; }
  const bars = 2, dur = bars * S.steps * (60/S.bpm/4) * 1000 + 300;
  toast("Auto-recording "+bars+" bars...");
  await recorder.start();
  await new Promise(r=>setTimeout(r,dur));
  const blob = await recorder.stop();
  await processExport(blob);
};

async function processExport(webmBlob){
  toast("Encoding MP3...");
  const now  = new Date();
  const date = now.toISOString().slice(0,10);
  const name = (S.projectName || "session").replace(/[^a-zA-Z0-9_-]/g,"_");
  const filename = name + "_" + S.bpm + "bpm_" + date;

  // Always download the project file so user can re-import later
  const projData = { version:1, exportedAt:now.toISOString(), exportedBy:username, ...S };
  setTimeout(()=>{
    dlBlob(new Blob([JSON.stringify(projData,null,2)], {type:"application/json"}), filename+".sleezy");
    toast("Project file saved — import with IMPORT button", "ok");
  }, 600);

  try{
    const ab      = await webmBlob.arrayBuffer();
    const actx    = new AudioContext();
    const decoded = await actx.decodeAudioData(ab);
    const nch=decoded.numberOfChannels, sr=decoded.sampleRate;
    const L=decoded.getChannelData(0), R=nch>1?decoded.getChannelData(1):L;
    const f2i=f32=>{ const o=new Int16Array(f32.length); for(let i=0;i<f32.length;i++) o[i]=Math.max(-32768,Math.min(32767,f32[i]*32768)); return o; };
    const enc=new lamejs.Mp3Encoder(nch,sr,192), block=1152, parts=[];
    for(let i=0;i<L.length;i+=block){
      const out=nch>1?enc.encodeBuffer(f2i(L.subarray(i,i+block)),f2i(R.subarray(i,i+block))):enc.encodeBuffer(f2i(L.subarray(i,i+block)));
      if(out.length) parts.push(new Int8Array(out));
    }
    const fl=enc.flush(); if(fl.length) parts.push(new Int8Array(fl));
    dlBlob(new Blob(parts,{type:"audio/mp3"}), filename+".mp3");
    toast("MP3 saved!", "ok");
  }catch(e){
    console.warn("MP3 encode failed:",e);
    dlBlob(webmBlob, filename+".webm");
    toast("Saved as WebM (MP3 failed)", "err");
  }
}
function dlBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

// ═══════════════════════════════════════════════════════════════
//  WIRE UP STATIC BUTTONS via addEventListener
//  Inline onclick attributes don't reliably fire in Discord's
//  WebView — addEventListener on element IDs always works.
// ═══════════════════════════════════════════════════════════════
function bindBtn(id, fn){
  var el = document.getElementById(id);
  if(el) el.addEventListener("click", fn);
}
function bindChange(id, fn){
  var el = document.getElementById(id);
  if(el){ el.addEventListener("change", fn); el.addEventListener("input", fn); }
}

bindBtn("btn-save",        function(){ W.saveProject(); });
bindBtn("btn-rename",      function(){ W.renameProject(); });
bindBtn("btn-delete-proj", function(){
  var sel = document.getElementById("proj-loader");
  var name = sel.value;
  if(!name){ toast("Select a project to delete","err"); return; }
  if(confirm("Delete project \"" + name + "\"? This cannot be undone."))
    socket && socket.emit("deleteProject", name);
});
bindBtn("btn-import", function(){
  document.getElementById("import-file").click();
});
bindBtn("rec-btn",      function(){ W.toggleRecord(); });
bindBtn("play-btn",     function(){ W.togglePlay(); });
bindBtn("btn-stop",     function(){ W.stopTransport(); });
bindBtn("btn-clear",    function(){ W.clearGrid(); });
bindBtn("btn-export-mp3",  function(){ W.exportAudio(); });
bindBtn("btn-export-proj", function(){ W.exportProjectFile(); });
bindBtn("btn-export",      function(){ W.exportAudio(); }); // legacy id
bindBtn("log-toggle",   function(){ W.toggleLog(); });
bindBtn("ov-log-btn",   function(){ W.toggleLog(); });
bindBtn("btn-add-beat", function(){ W.addBeat(); });
bindBtn("audio-unlock", function(){ doUnlockAudio(); });

// Users panel toggle
bindBtn("users-badge", function(){
  var panel = document.getElementById("users-panel");
  if(panel) panel.classList.toggle("hidden");
});
// Close users panel on click outside
document.addEventListener("click", function(e){
  var panel = document.getElementById("users-panel");
  var badge = document.getElementById("users-badge");
  if(panel && !panel.contains(e.target) && e.target !== badge && !badge.contains(e.target))
    panel.classList.add("hidden");
});

// Import file handler
var importFile = document.getElementById("import-file");
if(importFile){
  importFile.addEventListener("change", function(){
    var file = this.files && this.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        if(!data.beats || !data.bpm){ toast("Invalid project file","err"); return; }
        for(var id in synthMap){ try{synthMap[id].node.dispose();}catch(_){} }
        Object.values(fxMap).forEach(function(f){ Object.values(f).forEach(function(n){ try{n.dispose();}catch(_){} }); });
        synthMap={}; fxMap={}; customMap={}; mutedSet=new Set(); soloId=null;
        if(socket) socket.emit("importProject", data);
      }catch(e){ toast("Failed to read file: "+e.message,"err"); }
    };
    reader.readAsText(file);
    this.value = "";
  });
}

// Debounce helper
function debounce(fn, delay){
  var t; return function(){ var a=arguments, ctx=this; clearTimeout(t); t=setTimeout(function(){ fn.apply(ctx,a); }, delay); };
}

bindChange("proj-loader", function(){ if(this.value) W.loadProject(this.value); });
bindChange("step-sel",    function(){ W.changeSteps(+this.value); });

var bpmSl = document.getElementById("bpm-sl");
if(bpmSl){
  var sendBPMDebounced = debounce(function(v){ W.sendBPM(v); }, 300);
  bpmSl.addEventListener("input", function(){
    var v = +this.value;
    W.bpmUI(v);
    sendBPMDebounced(v);
  });
}
var revSl = document.getElementById("reverb-sl");
if(revSl) revSl.addEventListener("input", function(){ W.setReverb(+this.value); });

// Auto-hide log panel after 15s
setTimeout(function(){
  var p = document.getElementById("log-panel");
  if(p) p.classList.add("hidden");
}, 15000);

// ── KICK OFF ───────────────────────────────────────────────────
boot();
</script>
