<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Channel Rack</title>
  <script src="https://cdn.jsdelivr.net/npm/tone"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #1e1e2e;
      --panel: #2a2a3e;
      --text: #cdd6f4;
      --step-off-1: #45475a;
      --step-off-2: #585b70;
      --step-on: #a6e3a1;
      --step-active: #f9e2af;
      --accent: #89b4fa;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }

    /* Start Overlay (Required for Browsers/Discord) */
    #start-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      cursor: pointer;
    }
    #start-overlay h1 { color: var(--accent); }

    /* Transport Bar (Top) */
    .transport {
      background: var(--panel);
      width: 100%;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      margin-bottom: 30px;
    }

    button {
      background: var(--step-off-1);
      color: var(--text);
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    button:hover { background: var(--step-off-2); }
    #playBtn { background: var(--step-on); color: #111; }
    
    .bpm-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      padding: 5px 15px;
      border-radius: 4px;
    }

    /* Channel Rack */
    .channel-rack {
      background: var(--panel);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    .row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .instrument-label {
      width: 100px;
      text-transform: capitalize;
      font-weight: bold;
      background: var(--bg);
      padding: 8px;
      border-radius: 4px;
      margin-right: 15px;
      text-align: right;
      color: var(--accent);
    }

    .steps { display: flex; gap: 4px; }

    .step-btn {
      width: 35px;
      height: 45px;
      border-radius: 4px;
      border: 2px solid transparent;
      padding: 0;
    }

    /* FL Studio Style Beat Grouping (Groups of 4) */
    .step-btn.beat-0 { background: var(--step-off-1); }
    .step-btn.beat-1 { background: var(--step-off-2); }

    /* Active states applied via JS */
  </style>
</head>
<body>

<div id="start-overlay" onclick="initAudio()">
  <h1>Click Anywhere to Start</h1>
</div>

<div class="transport">
  <button id="playBtn" onclick="togglePlay()">PLAY</button>
  <button onclick="clearGrid()">CLEAR</button>
  <div class="bpm-container">
    <input id="bpm" type="range" min="60" max="180" value="120" oninput="updateBPM(this.value)" onchange="sendBPM(this.value)"/>
    <span id="bpmVal" style="font-family: monospace; font-size: 1.2em;">120 BPM</span>
  </div>
</div>

<div class="channel-rack" id="rack"></div>

<script>
// --- CONFIG & NETWORK ---
const socket = io("https://beat-backend-5nnu.onrender.com", { transports: ["websocket"] }); // CHANGE THIS URL TO YOUR SERVER
const STEPS = 16;
let grid = {};
let currentStep = 0;
let isPlaying = false;
