<!DOCTYPE html>
<html>
<head>
  <title>Multiplayer Beat Maker</title>
  <script src="https://cdn.jsdelivr.net/npm/tone"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body style="background:#111;color:white;font-family:sans-serif;text-align:center">

<h2>🎵 Multiplayer Beat Maker</h2>

<input id="bpm" type="range" min="60" max="180" value="100"/>
<span id="bpmVal">100 BPM</span>

<div id="grid" style="margin-top:20px"></div>

<script>
const socket = io("https://beat-backend-5nnu.onrender.com", {
  transports: ["websocket"]
});

const STEPS = 16;
let grid = null;
let currentStep = 0;

// Sounds
const kick = new Tone.Player("https://cdn.jsdelivr.net/gh/Tonejs/Tone.js/examples/audio/drum-samples/CR78/kick.mp3").toDestination();
const snare = new Tone.Player("https://cdn.jsdelivr.net/gh/Tonejs/Tone.js/examples/audio/drum-samples/CR78/snare.mp3").toDestination();
const hihat = new Tone.Player("https://cdn.jsdelivr.net/gh/Tonejs/Tone.js/examples/audio/drum-samples/CR78/hihat.mp3").toDestination();

// Unlock audio
document.body.onclick = async () => {
  await Tone.start();
};

// Store buttons
const buttons = {};

// Build grid ONCE
function buildGrid() {
  const container = document.getElementById("grid");
  container.innerHTML = "";

  Object.keys(grid).forEach(instrument => {
    const row = document.createElement("div");

    const label = document.createElement("span");
    label.innerText = instrument.toUpperCase() + " ";
    label.style.width = "80px";
    label.style.display = "inline-block";

    row.appendChild(label);

    buttons[instrument] = [];

    grid[instrument].forEach((active, i) => {
      const btn = document.createElement("button");

      btn.style.margin = "3px";
      btn.style.width = "30px";
      btn.style.height = "30px";
      btn.style.border = "none";
      btn.style.borderRadius = "4px";

      btn.onclick = () => {
        socket.emit("toggleStep", {
          instrument,
          stepIndex: i
        });
      };

      row.appendChild(btn);
      buttons[instrument].push(btn);
    });

    container.appendChild(row);
  });

  updateGridUI();
}

// Update UI WITHOUT rebuilding
function updateGridUI() {
  Object.keys(grid).forEach(instrument => {
    grid[instrument].forEach((active, i) => {
      const btn = buttons[instrument][i];

      // Base color
      btn.style.background = active ? "#00ff88" : "#333";

      // Highlight current step
      if (i === currentStep) {
        btn.style.border = "2px solid yellow";
      } else {
        btn.style.border = "none";
      }
    });
  });
}

// Play sounds + animate step
socket.on("tick", ({ step, grid: serverGrid }) => {
  if (!serverGrid) return;

  currentStep = step;
  grid = serverGrid;

  // Play sounds
  if (grid.kick[step]) kick.start();
  if (grid.snare[step]) snare.start();
  if (grid.hihat[step]) hihat.start();

  updateGridUI();
});

// Init
socket.on("init", (data) => {
  grid = data.grid;
  buildGrid();
});

// Updates
socket.on("gridUpdate", (newGrid) => {
  grid = newGrid;
  updateGridUI();
});

// BPM
const bpmSlider = document.getElementById("bpm");
const bpmVal = document.getElementById("bpmVal");

bpmSlider.oninput = () => {
  bpmVal.innerText = bpmSlider.value + " BPM";
  socket.emit("setBPM", Number(bpmSlider.value));
};
</script>

</body>
</html>
