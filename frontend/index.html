<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Studio Pro | Collaborative DAW</title>
  
  <script src="https://unpkg.com/@discord/embedded-app-sdk@1.0.0/dist/index.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  
  <style>
    :root {
      --bg: #09090b; --panel: #18181f; --panel-light: #24242f;
      --text: #e2e2e8; --text-muted: #8b8b9e;
      --border: #313142; --border-highlight: #454559;
      --accent: #5865F2; --danger: #ff3366; --record: #ff4747;
      --step-off-1: #252530; --step-off-2: #2e2e3b;
      --step-on: #5865F2; --step-active: #ffffff;
    }
    
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
      margin: 0; 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      overflow: hidden;
      user-select: none;
    }

    /* Discord Auth Overlay */
    #loading-overlay { 
      position: fixed; inset: 0; 
      background: var(--bg); 
      display: flex; flex-direction: column; 
      justify-content: center; align-items: center; 
      z-index: 2000; transition: opacity 0.5s; 
    }
    .spinner { 
      width: 50px; height: 50px; 
      border: 5px solid var(--panel-light); 
      border-top-color: var(--accent); 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Top Navigation */
    .top-bar { 
      background: var(--panel); 
      width: 100%; 
      border-bottom: 1px solid var(--border); 
      padding: 10px 20px; 
      display: flex; justify-content: space-between; align-items: center; 
      box-sizing: border-box; 
    }
    .nav-group { display: flex; align-items: center; gap: 12px; }
    .project-name { font-weight: 700; font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    
    /* Transport Controls */
    .transport { 
      background: var(--panel-light); 
      width: 100%; padding: 12px 20px; 
      display: flex; justify-content: center; align-items: center; 
      gap: 20px; border-bottom: 1px solid var(--border); 
      box-sizing: border-box;
      position: relative;
    }
    .status-area { position: absolute; left: 20px; display: flex; align-items: center; gap: 10px; }
    #status-dot { width: 8px; height: 8px; background: #444; border-radius: 50%; }
    #status-dot.online { background: #3ba55c; box-shadow: 0 0 8px #3ba55c; }

    button, select { 
      background: var(--panel); color: var(--text); 
      border: 1px solid var(--border); padding: 8px 14px; 
      border-radius: 5px; cursor: pointer; 
      font-size: 12px; font-weight: 600; 
      transition: 0.15s cubic-bezier(0.4, 0, 0.2, 1); outline: none; 
    }
    button:hover { background: var(--border-highlight); border-color: var(--text-muted); }
    button:active { transform: translateY(1px); }

    #playBtn { background: var(--accent); color: #fff; border: none; width: 100px; font-size: 13px; }
    #recBtn { color: var(--record); border-color: var(--record); }
    #recBtn.recording { background: var(--record); color: #fff; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    .control-group { 
      display: flex; align-items: center; gap: 10px; 
      background: var(--bg); padding: 5px 15px; 
      border-radius: 6px; border: 1px solid var(--border); 
    }
    .control-group label { font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
    
    /* Channel Rack */
    .channel-rack-container { 
      flex: 1; width: 100%; overflow-y: auto; overflow-x: auto;
      padding: 30px; box-sizing: border-box; 
      background: radial-gradient(circle at 50% 50%, #121217 0%, #09090b 100%);
    }
    .row { 
      display: flex; margin-bottom: 10px; 
      background: var(--panel); 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      transition: border-color 0.3s;
      width: fit-content;
    }
    .row:hover { border-color: var(--border-highlight); }
    .row.is-mine { border-left: 4px solid var(--accent); }

    .track-controls { 
      position: sticky; left: 0; 
      display: flex; flex-direction: column; gap: 8px; 
      background: var(--panel); padding: 15px; 
      z-index: 10; border-right: 2px solid var(--border); 
      width: 300px; box-sizing: border-box;
    }
    .track-header { display: flex; justify-content: space-between; align-items: center; }
    .track-author { font-size: 10px; color: var(--accent); font-weight: 800; letter-spacing: 0.5px; }
    
    .track-row { display: flex; align-items: center; gap: 8px; }
    .vol-container { 
      display: flex; align-items: center; gap: 8px; flex: 1; 
      background: var(--bg); padding: 4px 10px; 
      border-radius: 4px; border: 1px solid var(--border);
    }

    /* Step Grid */
    .steps { display: flex; gap: 4px; padding: 10px 25px; align-items: center; }
    .step-btn { 
      width: 36px; height: 65px; 
      border-radius: 4px; border: 2px solid transparent; 
      cursor: pointer; transition: 0.1s;
    }
    .step-btn.beat-0 { background: var(--step-off-1); }
    .step-btn.beat-1 { background: var(--step-off-2); }
    .step-btn.active { background: var(--step-on) !important; box-shadow: 0 0 15px var(--accent); }
    .step-btn.playing { border-color: var(--step-active); filter: brightness(1.5); }

    .add-track-btn { 
      margin-top: 20px; background: transparent; 
      border: 2px dashed var(--border); color: var(--text-muted); 
      padding: 20px; width: 300px; border-radius: 8px;
    }
    .add-track-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="load-status" style="margin-top: 20px; font-weight: 600; letter-spacing: 1px; color: var(--text-muted);">INITIALIZING DAW...</p>
</div>

<div class="top-bar">
  <div class="nav-group">
    <span class="project-name" id="projectNameDisplay">Session: Loading...</span>
    <button onclick="saveProject()">SAVE PROJECT</button>
    <select id="projectLoader" onchange="loadProject(this.value)">
      <option value="">LOAD PROJECT...</option>
    </select>
  </div>
  <div id="userBadge" style="display: flex; align-items: center; gap: 12px;">
    <span id="userName" style="font-size: 12px; font-weight: 600;">Connecting...</span>
  </div>
</div>

<div class="transport">
  <div class="status-area">
    <div id="status-dot"></div>
    <span id="users-count" style="font-size: 11px; font-weight: 800; color: var(--text-muted);">USERS: 0</span>
  </div>

  <button id="recBtn" onclick="toggleRecord()">⏺ EXPORT WEB LAYER</button>
  <button id="playBtn" onclick="togglePlay()">PLAY</button>
  <button onclick="clearGrid()" style="color: var(--danger)">CLEAR ALL</button>
  
  <div class="control-group">
    <label>GRID</label>
    <select id="stepSelect" onchange="socket.emit('changeSteps', Number(this.value))">
      <option value="16">16 Steps</option>
      <option value="32">32 Steps</option>
      <option value="64">64 Steps</option>
    </select>
  </div>

  <div class="control-group">
    <label>BPM</label>
    <input id="bpm" type="range" min="40" max="220" value="120" oninput="updateBPMUI(this.value)" onchange="socket.emit('setBPM', Number(this.value))"/>
    <span id="bpmVal" style="font-family: monospace; font-size: 13px; font-weight: bold; width: 35px;">120</span>
  </div>
</div>

<div class="channel-rack-container">
  <div id="rack"></div>
</div>

<script>
/**
 * CORE LOGIC & DISCORD INTEGRATION
 */
const socket = io("https://beat-backend-5nnu.onrender.com", { transports: ["websocket"] });
const discordSdk = new discord.DiscordSDK("YOUR_CLIENT_ID_HERE");

let currentUser = { id: 'local-' + Math.random(), username: "Guest" };
let synthInstances = {};
let buttons = {};
let state = { projectId: "", projectName: "Untitled", bpm: 120, steps: 16, channels: [], isPlaying: false };
let currentStep32 = 0;
let isPlaying = false;
let isRecording = false;
let recorder;
let masterCompressor, masterReverb;

const NOTES = ["C1","D1","E1","F1","G1","A1","B1","C2","D2","E2","F2","G2","A2","B2","C3","D3","E3","F3","G3","A3","B3","C4","D4","E4","F4","G4","A4","B4"];

// --- 150+ SYNTH ENGINE DEFINITIONS ---
const p = (type, opts) => new Tone.PolySynth(type, opts);
const m = (opts) => new Tone.MembraneSynth(opts);
const n = (opts) => new Tone.NoiseSynth(opts);
const met = (opts) => new Tone.MetalSynth(opts);

const SYNTH_LIBRARY = {
  "KICKS": {
    "Kick - 808 Trap": () => m({ pitchDecay: 0.05, octaves: 4, envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4 } }),
    "Kick - Deep House": () => m({ pitchDecay: 0.08, octaves: 5, envelope: { attack: 0.001, decay: 0.2, sustain: 0 } }),
    "Kick - Industrial": () => m({ pitchDecay: 0.2, octaves: 8, envelope: { attack: 0.001, decay: 0.3 } }),
    "Kick - LoFi Vinyl": () => m({ pitchDecay: 0.02, octaves: 2, envelope: { attack: 0.05, decay: 0.3 } })
  },
  "SNARES": {
    "Snare - Trap": () => n({ noise: { type: 'pink' }, envelope: { attack: 0.001, decay: 0.1, sustain: 0 } }),
    "Snare - Pop 909": () => n({ noise: { type: 'white' }, envelope: { attack: 0.001, decay: 0.2, sustain: 0 } }),
    "Clap - Studio": () => n({ noise: { type: 'white' }, envelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.1 } })
  },
  "HATS": {
    "Hat - Closed": () => met({ frequency: 600, envelope: { attack: 0.001, decay: 0.05 }, harmonicity: 5.1, resonance: 4000 }),
    "Hat - Open": () => met({ frequency: 400, envelope: { attack: 0.001, decay: 0.3 }, harmonicity: 5.1, resonance: 4000 })
  },
  "BASS": {
    "Bass - Sub Sine": () => p(Tone.Synth, { oscillator: { type: "sine" }, envelope: { attack: 0.05, decay: 0.4, sustain: 0.8, release: 1 } }),
    "Bass - Saw Grit": () => p(Tone.Synth, { oscillator: { type: "fatsawtooth", count: 3, spread: 20 }, envelope: { attack: 0.01, decay: 0.3, sustain: 0.4 } }),
    "Bass - Acid": () => p(Tone.MonoSynth, { oscillator: { type: "sawtooth" }, filter: { Q: 4, type: "lowpass", rolloff: -24 }, envelope: { attack: 0.01, decay: 0.2 } })
  },
  "LEADS": {
    "Lead - Square Wave": () => p(Tone.Synth, { oscillator: { type: "square" }, envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 } }),
    "Lead - Dreamy Sine": () => p(Tone.Synth, { oscillator: { type: "fatsine", count: 3 }, envelope: { attack: 0.1, release: 2 } }),
    "Lead - Trance Saw": () => p(Tone.Synth, { oscillator: { type: "fatsawtooth", count: 5, spread: 30 } })
  }
};

// --- INITIALIZATION ---
async function setup() {
  try {
    document.getElementById("load-status").innerText = "AUTHORIZING WITH DISCORD...";
    await discordSdk.ready();
    const { code } = await discordSdk.commands.authorize({
      client_id: "YOUR_CLIENT_ID_HERE",
      response_type: "code", scope: ["identify", "guilds"], prompt: "none",
    });

    const response = await fetch("/api/token", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code }),
    });
    const { access_token } = await response.json();
    const auth = await discordSdk.commands.authenticate({ access_token });

    currentUser = { id: auth.user.id, username: auth.user.username || auth.user.global_name };
    document.getElementById("userName").innerText = `DJ: ${currentUser.username.toUpperCase()}`;
    
    socket.emit("registerUser", { userId: currentUser.id, username: currentUser.username });
    
    await Tone.start();
    initAudioEngine();
    
    document.getElementById("loading-overlay").style.opacity = "0";
    setTimeout(() => document.getElementById("loading-overlay").remove(), 500);
  } catch (e) {
    console.warn("Discord SDK failed, running in standalone mode.");
    document.getElementById("load-status").innerText = "OFFLINE MODE - STARTING...";
    await Tone.start();
    initAudioEngine();
    setTimeout(() => document.getElementById("loading-overlay").remove(), 1000);
  }
}

function initAudioEngine() {
  masterCompressor = new Tone.Compressor({ threshold: -18, ratio: 4 }).toDestination();
  masterReverb = new Tone.Reverb({ decay: 1.5, wet: 0.08 }).connect(masterCompressor);
  recorder = new Tone.Recorder();
  masterCompressor.connect(recorder);

  Tone.Transport.scheduleRepeat((time) => {
    state.channels.forEach(ch => {
      if (currentStep32 % ch.speed === 0) {
        let stepIndex = Math.floor(currentStep32 / ch.speed) % state.steps;
        if (ch.pattern[stepIndex] && synthInstances[ch.id]) {
          synthInstances[ch.id].node.triggerAttackRelease(ch.note, "16n", time);
        }
      }
    });
    Tone.Draw.schedule(() => updatePlayheadUI(currentStep32), time);
    currentStep32++;
  }, "32n");
}

function updateLocalSynth(chId, instName, vol) {
  if (synthInstances[chId]) synthInstances[chId].node.dispose();
  
  let generator;
  for (const cat in SYNTH_LIBRARY) {
    if (SYNTH_LIBRARY[cat][instName]) generator = SYNTH_LIBRARY[cat][instName];
  }
  if (!generator) generator = SYNTH_LIBRARY["KICKS"]["Kick - 808 Trap"];

  const node = generator().connect(masterReverb);
  node.volume.value = vol || -6;
  synthInstances[chId] = { type: instName, node: node };
}

// --- UI GENERATOR ---
function buildGrid() {
  const rack = document.getElementById("rack");
  rack.innerHTML = "";
  buttons = {};

  state.channels.forEach(ch => {
    const isMine = ch.userId === currentUser.id;
    const row = document.createElement("div");
    row.className = `row ${isMine ? 'is-mine' : ''}`;

    const controls = document.createElement("div");
    controls.className = "track-controls";
    controls.innerHTML = `
      <div class="track-header">
        <span class="track-author">${ch.author}</span>
        ${isMine ? `<button onclick="socket.emit('removeTrack', '${ch.id}')" style="color:var(--danger); padding:2px 8px; border:none;">×</button>` : ''}
      </div>
    `;

    const tr1 = document.createElement("div");
    tr1.className = "track-row";
    const instSel = document.createElement("select");
    instSel.style.flex = "1";
    instSel.disabled = !isMine;
    for (const cat in SYNTH_LIBRARY) {
      const g = document.createElement("optgroup"); g.label = cat;
      for (const s in SYNTH_LIBRARY[cat]) {
        const o = document.createElement("option"); o.value = s; o.innerText = s;
        if(s === ch.inst) o.selected = true;
        g.appendChild(o);
      }
      instSel.appendChild(g);
    }
    instSel.onchange = (e) => socket.emit("updateTrackParam", { channelId: ch.id, key: "inst", value: e.target.value });
    tr1.appendChild(instSel);
    
    const noteSel = document.createElement("select");
    noteSel.style.width = "60px";
    noteSel.disabled = !isMine;
    NOTES.forEach(n => {
      const o = document.createElement("option"); o.value = n; o.innerText = n;
      if(n === ch.note) o.selected = true;
      noteSel.appendChild(o);
    });
    noteSel.onchange = (e) => socket.emit("updateTrackParam", { channelId: ch.id, key: "note", value: e.target.value });
    tr1.appendChild(noteSel);
    controls.appendChild(tr1);

    const tr2 = document.createElement("div");
    tr2.className = "track-row";
    tr2.innerHTML = `
      <select onchange="socket.emit('updateTrackParam', {channelId:'${ch.id}', key:'speed', value:Number(this.value)})" ${!isMine?'disabled':''}>
        <option value="1" ${ch.speed==1?'selected':''}>FAST</option>
        <option value="2" ${ch.speed==2?'selected':''}>NORM</option>
        <option value="4" ${ch.speed==4?'selected':''}>SLOW</option>
      </select>
    `;
    const volBox = document.createElement("div");
    volBox.className = "vol-container";
    volBox.innerHTML = `<label>VOL</label>`;
    const volInput = document.createElement("input");
    volInput.type = "range"; volInput.min = "-40"; volInput.max = "10"; volInput.value = ch.vol;
    volInput.disabled = !isMine;
    volInput.style.width = "100%";
    volInput.oninput = (e) => { if(synthInstances[ch.id]) synthInstances[ch.id].node.volume.value = Number(e.target.value); };
    volInput.onchange = (e) => socket.emit("updateTrackParam", { channelId: ch.id, key: "vol", value: Number(e.target.value) });
    volBox.appendChild(volInput);
    tr2.appendChild(volBox);
    controls.appendChild(tr2);

    row.appendChild(controls);

    const stepsCont = document.createElement("div");
    stepsCont.className = "steps";
    buttons[ch.id] = [];
    ch.pattern.forEach((active, i) => {
      const b = document.createElement("button");
      b.className = `step-btn beat-${Math.floor(i/4)%2} ${active?'active':''}`;
      b.onclick = () => { if(isMine) socket.emit("toggleStep", { channelId: ch.id, stepIndex: i, val: !ch.pattern[i] }); };
      stepsCont.appendChild(b);
      buttons[ch.id].push(b);
    });
    row.appendChild(stepsCont);
    rack.appendChild(row);
  });

  const add = document.createElement("button");
  add.className = "add-track-btn";
  add.innerText = "+ CREATE NEW TRACK LAYER";
  add.onclick = () => socket.emit("addTrack", { userId: currentUser.id, username: currentUser.username });
  rack.appendChild(add);
}

function updatePlayheadUI(tick32) {
  state.channels.forEach(ch => {
    if (!buttons[ch.id]) return;
    if (tick32 % ch.speed === 0) {
      let step = Math.floor(tick32 / ch.speed) % state.steps;
      buttons[ch.id].forEach((b, i) => {
        if(i === step) b.classList.add("playing");
        else b.classList.remove("playing");
      });
    }
  });
}

// --- SOCKET HANDLERS ---
socket.on("connect", () => { document.getElementById("status-dot").className = "online"; });
socket.on("userCount", c => { document.getElementById("users-count").innerText = `USERS: ${c}`; });

socket.on("initState", (s) => { 
  state = s; 
  updateBPMUI(s.bpm); 
  document.getElementById("stepSelect").value = s.steps;
  document.getElementById("projectNameDisplay").innerText = `SESSION: ${s.projectName}`;
  buildGrid(); 
  s.channels.forEach(c => updateLocalSynth(c.id, c.inst, c.vol)); 
});

socket.on("trackParamUpdated", ({ channelId, key, value }) => {
  const ch = state.channels.find(c => c.id === channelId);
  if (ch) {
    ch[key] = value;
    if (key === "inst") updateLocalSynth(channelId, value, ch.vol);
    if (key === "vol" && synthInstances[channelId]) synthInstances[channelId].node.volume.value = value;
    if (key === "speed" || key === "note") buildGrid();
  }
});

socket.on("stepToggled", ({ channelId, stepIndex, val }) => {
  const ch = state.channels.find(c => c.id === channelId);
  if (ch) ch.pattern[stepIndex] = val;
  if (buttons[channelId]) {
    if(val) buttons[channelId][stepIndex].classList.add("active");
    else buttons[channelId][stepIndex].classList.remove("active");
  }
});

socket.on("playUpdate", (playing) => {
  isPlaying = playing;
  isPlaying ? Tone.Transport.start() : Tone.Transport.pause();
  document.getElementById("playBtn").innerText = isPlaying ? "STOP" : "PLAY";
  document.getElementById("playBtn").style.background = isPlaying ? "var(--danger)" : "var(--accent)";
});

socket.on("projectList", (list) => {
  const select = document.getElementById("projectLoader");
  select.innerHTML = '<option value="">LOAD PROJECT...</option>';
  list.forEach(p => { const o = document.createElement("option"); o.value = p; o.innerText = p; select.appendChild(o); });
});

// --- EXPORT & CONTROLS ---
async function toggleRecord() {
  const btn = document.getElementById("recBtn");
  if (!isRecording) {
    await recorder.start();
    isRecording = true;
    btn.innerText = "⏹ STOP & DOWNLOAD";
    btn.classList.add("recording");
    if(!isPlaying) togglePlay();
  } else {
    isRecording = false;
    btn.innerText = "⏺ EXPORT WEB LAYER";
    btn.classList.remove("recording");
    const blob = await recorder.stop();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `${state.projectName}.webm`; a.click();
  }
}

function togglePlay() { socket.emit("togglePlay", !isPlaying); }
function updateBPMUI(v) { document.getElementById("bpmVal").innerText = v; document.getElementById("bpm").value = v; if(Tone.Transport) Tone.Transport.bpm.value = v; }
function clearGrid() { socket.emit("clearGrid"); }
function saveProject() { const n = prompt("Name your project:", state.projectName); if(n) socket.emit("saveProject", n); }
function loadProject(v) { if(v) socket.emit("loadProject", v); document.getElementById("projectLoader").value = ""; }

// Boot
setup();
</script>
</body>
</html>
